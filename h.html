<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スピードクイズ - 回答 (h)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #0b0e14; color: #fff; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        #wait-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .waiting-text { font-size: 1.5rem; color: #f1c40f; font-weight: bold; }

        #quiz-area { display: none; flex: 1; padding: 15px; flex-direction: column; justify-content: center; }
        .q-title { font-size: 1.2rem; margin-bottom: 20px; color: #2ecc71; font-weight: bold; text-align: center; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 500px; margin: 0 auto; }
        
        .ans-btn { background: #1a202c; border: 3px solid #2ecc71; color: #2ecc71; padding: 25px 0; font-size: 2.2rem; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .ans-btn:active { background: #2ecc71; color: #0b0e14; transform: scale(0.95); }
        .ans-btn:disabled { border-color: #444; color: #444; opacity: 0.3; }

        #sent-msg { display: none; font-size: 1.2rem; color: #2ecc71; margin-top: 20px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="wait-area">
        <div class="waiting-text" id="status-label">待機中...</div>
        <p style="color: #8892b0;">スクリーンに注目してください</p>
    </div>

    <div id="quiz-area">
        <div class="q-title" id="q-label">第 1 問</div>
        <div class="btn-grid">
            <button class="ans-btn" onclick="sendAnswer('A')">A</button>
            <button class="ans-btn" onclick="sendAnswer('B')">B</button>
            <button class="ans-btn" onclick="sendAnswer('C')">C</button>
            <button class="ans-btn" onclick="sendAnswer('D')">D</button>
            <button class="ans-btn" onclick="sendAnswer('E')">E</button>
            <button class="ans-btn" onclick="sendAnswer('F')">F</button>
        </div>
        <div id="sent-msg">送信完了！</div>
    </div>

<script>
    firebase.initializeApp({ apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", authDomain: "speed-quiz26.firebaseapp.com", databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "speed-quiz26" });
    const db = firebase.database();
    let myUid = "u" + Math.random().toString(36).substring(2, 7);

    db.ref('adminCommand').on('value', snap => {
        const cmd = snap.val(); 
        const waitArea = document.getElementById('wait-area');
        const quizArea = document.getElementById('quiz-area');
        const sentMsg = document.getElementById('sent-msg');
        const btns = document.querySelectorAll('.ans-btn');

        // ★修正ポイント：命令がない、またはstandbyの時は待機画面
        if (!cmd || cmd.type === 'standby' || cmd.type === 'reset') {
            document.getElementById('status-label').innerText = "待機中...";
            waitArea.style.display = 'flex'; quizArea.style.display = 'none';
            return;
        }

        if (cmd.type === 'start' || cmd.type === 'next') {
            waitArea.style.display = 'none'; quizArea.style.display = 'flex'; sentMsg.style.display = 'none';
            document.getElementById('q-label').innerText = `第 ${cmd.qIndex + 1} 問`;
            btns.forEach(b => { b.disabled = false; b.style.visibility = 'visible'; });
        } else if (cmd.type === 'close') {
            document.getElementById('status-label').innerText = "受付終了";
            waitArea.style.display = 'flex'; quizArea.style.display = 'none';
        }
    });

    function sendAnswer(choice) {
        const btns = document.querySelectorAll('.ans-btn');
        btns.forEach(b => b.disabled = true);
        db.ref('answers/' + myUid).set({ choice: choice, ts: Date.now() }).then(() => {
            document.getElementById('sent-msg').style.display = 'block';
            btns.forEach(b => { if(b.innerText !== choice) b.style.visibility = 'hidden'; });
        });
    }
</script>

</body>
</html>
