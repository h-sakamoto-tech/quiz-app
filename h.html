<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>クイズ回答画面</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; background: #f0f2f5; color: #333; text-align: center; overflow-x: hidden; }
        .screen { display: none; padding: 20px; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .active { display: flex; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { font-size: 24px; color: #2c3e50; margin-bottom: 20px; }
        input[type="text"] { font-size: 20px; padding: 15px; width: 80%; border: 2px solid #bdc3c7; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .btn-join { font-size: 20px; background: #e74c3c; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); width: 80%; }
        .message-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 90%; }
        .icon-large { font-size: 60px; color: #3498db; margin-bottom: 15px; }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .grid-options button:last-child:nth-child(odd) { grid-column: span 2; }
        
        .btn-opt { font-size: 32px; font-weight: bold; padding: 20px; border-radius: 15px; border: none; color: white; box-shadow: 0 4px 0px rgba(0,0,0,0.2); transition: transform 0.1s; }
        .btn-opt:active { transform: translateY(4px); box-shadow: none; }
        .btn-opt:disabled { opacity: 0.5; transform: none; box-shadow: none; }
        
        .bg-A { background: #e74c3c; } .bg-B { background: #3498db; }
        .bg-C { background: #2ecc71; } .bg-D { background: #f1c40f; color: #333; }
        .bg-E { background: #9b59b6; } .bg-F { background: #e67e22; }
        .bg-G { background: #34495e; }

        #quiz-status { font-size: 18px; font-weight: bold; color: #e74c3c; margin-bottom: 15px; height: 24px; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active">
        <h1>スピードクイズに参加！</h1>
        <p>スクリーンに表示するあなたの<br>名前（ニックネーム）を入力してください。</p>
        <input type="text" id="playerName" placeholder="名前を入力..." maxlength="10">
        <button class="btn-join" onclick="joinQuiz()">参加する！</button>
    </div>

    <div id="message-screen" class="screen">
        <div class="message-box">
            <i id="msg-icon" class="fas fa-clock icon-large"></i>
            <h2 id="msg-title">受付完了！</h2>
            <p id="msg-text" style="font-size: 18px; line-height: 1.5;">クイズが始まるまで、このまま<br>スクリーンを見てお待ちください。</p>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div id="quiz-status">正解だと思うボタンをタップ！</div>
        <div class="grid-options">
            <button class="btn-opt bg-A" onclick="sendAnswer('A')">A</button>
            <button class="btn-opt bg-B" onclick="sendAnswer('B')">B</button>
            <button class="btn-opt bg-C" onclick="sendAnswer('C')">C</button>
            <button class="btn-opt bg-D" onclick="sendAnswer('D')">D</button>
            <button class="btn-opt bg-E" onclick="sendAnswer('E')">E</button>
            <button class="btn-opt bg-F" onclick="sendAnswer('F')">F</button>
            <button class="btn-opt bg-G" onclick="sendAnswer('G')">G</button>
        </div>
    </div>

    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0",
            authDomain: "speed-quiz26.firebaseapp.com",
            databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "speed-quiz26"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let myUid = localStorage.getItem('quizUid');
        let savedName = localStorage.getItem('quizName'); 
        
        if (!myUid) {
            myUid = 'player_' + Date.now() + Math.floor(Math.random() * 1000);
            localStorage.setItem('quizUid', myUid);
        }

        if (savedName) {
            document.getElementById('playerName').value = savedName;
        }

        let questionStartTime = 0;
        let hasJoined = false; 
        let currentCmd = null; 
        
        // ★ ページを開いた時刻を記録（無限ループ防止の要）
        const pageLoadTime = Date.now(); 

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showMessage(iconClass, title, text, color) {
            switchScreen('message-screen');
            document.getElementById('msg-icon').className = iconClass + ' icon-large';
            document.getElementById('msg-icon').style.color = color;
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-text').innerHTML = text;
        }

        function joinQuiz() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { alert("名前を入力してください！"); return; }
            
            localStorage.setItem('quizName', name);
            db.ref('players/' + myUid).update({ name: name });
            hasJoined = true; 
            
            // ★ リセット待機中、またはクイズが始まっていない時は「待機画面」へ
            if (!currentCmd || currentCmd.type === 'reset') {
                showMessage('fas fa-clock', '受付完了！', 'クイズが始まるまで、このまま<br>スクリーンを見てお待ちください。', '#3498db');
            } else {
                applyCommand(currentCmd);
            }
        }

        db.ref('adminCommand').on('value', snap => {
            currentCmd = snap.val();
            
            // ★ 管理者が「今」リセットボタンを押した時だけ、静かにログイン画面に戻す（リロードはしない）
            if (currentCmd && currentCmd.type === 'reset' && currentCmd.ts > pageLoadTime) {
                hasJoined = false;
                localStorage.removeItem('quizUid');
                switchScreen('login-screen');
                return;
            }
            
            // 参加済みの場合は画面を切り替える
            if (hasJoined && currentCmd) {
                applyCommand(currentCmd);
            }
        });

        function applyCommand(cmd) {
            switch(cmd.type) {
                case 'rules':
                    showMessage('fas fa-chalkboard-teacher', 'ルール説明中', '前方のスクリーンをご覧ください！', '#e67e22');
                    break;
                case 'start':
                case 'next':
                    switchScreen('quiz-screen');
                    document.getElementById('quiz-status').innerText = "正解だと思うボタンをタップ！";
                    document.getElementById('quiz-status').style.color = "#333";
                    enableButtons(true);
                    questionStartTime = Date.now();
                    break;
                case 'close':
                    document.getElementById('quiz-status').innerText = "⏳ 締め切りました！スクリーンに注目！";
                    document.getElementById('quiz-status').style.color = "#e74c3c";
                    enableButtons(false);
                    break;
                case 'end':
                case 'details':
                case 'ranking':
                    showMessage('fas fa-trophy', 'クイズ終了！', 'お疲れ様でした！<br>結果はスクリーンで発表されます🎉', '#f1c40f');
                    break;
                case 'reset':
                    // 古いリセット信号の場合は無視する（待機画面のまま）
                    break;
            }
        }

        function enableButtons(isEnable) {
            document.querySelectorAll('.btn-opt').forEach(btn => {
                btn.disabled = !isEnable;
            });
        }

        function sendAnswer(choice) {
            enableButtons(false); 
            const timeTaken = Date.now() - questionStartTime;
            db.ref('answers/' + myUid).set({ choice: choice, time: timeTaken });
            document.getElementById('quiz-status').innerText = `【 ${choice} 】を送信しました！`;
            document.getElementById('quiz-status').style.color = "#2ecc71";
        }
    </script>
</body>
</html>
