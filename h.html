<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>参加</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { background:#121212; color:#fff; text-align:center; font-family:sans-serif; }
        .screen { display:none; padding:20px; height:100vh; flex-direction:column; justify-content:center; }
        .active { display:flex !important; }
        button { font-size:30px; padding:20px; margin:10px; border-radius:10px; border:none; cursor:pointer; }
        .btn-ans { background:#3498db; color:#fff; }
    </style>
</head>
<body>
    <div id="entry" class="screen active">
        <h2>チーム名</h2><input type="text" id="nn" style="font-size:24px; padding:10px;"><br>
        <button onclick="join()" style="background:#27ae60; color:#fff;">参加</button>
    </div>
    <div id="wait" class="screen"><h2>待機中...</h2><p id="my-name"></p></div>
    <div id="quiz" class="screen">
        <h2 id="qn">問題</h2>
        <div style="display:grid; grid-template-columns:1fr 1fr;">
            <button class="btn-ans" onclick="ans('A')">A</button><button class="btn-ans" onclick="ans('B')">B</button>
            <button class="btn-ans" onclick="ans('C')">C</button><button class="btn-ans" onclick="ans('D')">D</button>
        </div>
        <p id="msg"></p>
    </div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", authDomain: "speed-quiz26.firebaseapp.com", databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "speed-quiz26" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let uid = localStorage.getItem('quid') || "u"+Math.random().toString(36).substr(2,7); localStorage.setItem('quid', uid);
    let joined = false;

    function join() {
        const n = document.getElementById('nn').value; if(!n) return;
        db.ref('players/'+uid).set({name:n, score:0}).then(()=>{ joined=true; document.getElementById('my-name').innerText=n; switchS('wait'); });
    }
    db.ref('adminCommand').on('value', s => {
        const c = s.val(); if(!c || c.type==='reset') { joined=false; switchS('entry'); return; }
        if(!joined) return;
        if(c.type==='start'||c.type==='next') { 
            document.getElementById('qn').innerText=`第${c.qIndex+1}問`; 
            document.getElementById('msg').innerText="";
            document.querySelectorAll('.btn-ans').forEach(b=>b.disabled=false);
            switchS('quiz'); 
        }
        else if(c.type==='close') { document.querySelectorAll('.btn-ans').forEach(b=>b.disabled=true); document.getElementById('msg').innerText="終了"; }
        else { switchS('wait'); }
    });
    function ans(v) { db.ref('answers/'+uid).set({choice:v, ts:Date.now()}); document.getElementById('msg').innerText=v+" 送信済"; document.querySelectorAll('.btn-ans').forEach(b=>b.disabled=true); }
    function switchS(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
