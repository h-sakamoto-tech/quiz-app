<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ・コマンドセンター (index)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid #f1c40f; padding-bottom: 15px; }
        .header h1 { color: #f1c40f; margin: 0; font-size: 2rem; letter-spacing: 2px; }
        
        .section { background: #2d2d2d; padding: 20px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        /* クイズ問題の行 */
        .q-row { background: #3d3d3d; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #3498db; }
        .q-grid { display: flex; gap: 15px; align-items: flex-start; }
        
        /* プレビュー枠 */
        .preview-box { width: 160px; height: 120px; background: #000; border: 1px solid #555; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 6px; overflow: hidden; flex-shrink: 0; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .up-status { position: absolute; background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: none; align-items: center; justify-content: center; color: #f1c40f; font-size: 14px; font-weight: bold; }

        /* 入力エリア */
        .input-area { flex: 1; }
        .btn-upload { background: #3498db; color: #fff; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; display: inline-block; margin-bottom: 10px; transition: 0.3s; }
        .btn-upload:hover { background: #2980b9; }
        .q-img-url { width: 100%; padding: 8px; background: #111; color: #2ecc71; border: 1px solid #444; font-size: 11px; margin-bottom: 8px; border-radius: 4px; }
        textarea { width: 100%; height: 60px; background: #111; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 4px; resize: none; font-size: 14px; box-sizing: border-box; }
        
        .btn-save-all { background: #27ae60; color: white; width: 100%; padding: 18px; font-size: 22px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 0 #1e8449; }

        /* 進行管理パネル */
        .control-panel { position: sticky; top: 20px; }
        .status-display { background: #000; padding: 15px; text-align: center; border-radius: 8px; margin-bottom: 15px; border: 2px solid #f1c40f; }
        .btn-control { width: 100%; padding: 15px; font-size: 20px; color: white; border-radius: 8px; border: none; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1><i class="fa fa-shuttle-space"></i> SPEED QUIZ 2026 ADMIN</h1>
</div>

<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 25px;">
    <div class="section">
        <h2 style="margin-top:0;"><i class="fa fa-list-check"></i> 問題セットの編集</h2>
        
        <div style="display:none;">
            <input type="password" id="gh-token" value="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">
            <input type="text" id="gh-user" value="h-sakamoto-tech">
            <input type="text" id="gh-repo" value="quiz-app">
        </div>

        <div id="questions-container"></div>
        
        <button onclick="addQuestionRow()" style="width:100%; background:#444; color:#fff; padding:12px; border:2px dashed #666; border-radius:8px; cursor:pointer; font-size:16px;">
            <i class="fa fa-plus-circle"></i> 新しい問題を追加
        </button>
        
        <button class="btn-save-all" onclick="saveAll()">
            <i class="fa fa-cloud-arrow-up"></i> 全てを保存して反映
        </button>
    </div>

    <div class="control-panel">
        <div class="section">
            <h2 style="margin-top:0;"><i class="fa fa-gamepad"></i> 進行コントロール</h2>
            <div class="status-display">
                <div id="status-text" style="font-size:24px; color:#f1c40f; font-weight:bold;">待機中</div>
            </div>
            
            <button class="btn-control" style="background:#8e44ad;" id="btn-start" onclick="startFlow()">
                🚀 クイズ開始
            </button>
            
            <div id="nav-btns" style="display:none; gap:10px;">
                <button class="btn-control" style="background:#555; flex:1;" onclick="prev()">戻る</button>
                <button class="btn-control" style="background:#e74c3c; flex:2;" onclick="next()">次へ</button>
            </div>
            
            <button onclick="resetGame()" style="width:100%; background:none; color:#555; border:1px solid #444; cursor:pointer; padding:8px; border-radius:5px; margin-top:20px;">全データをリセット</button>
        </div>
    </div>
</div>

<script>
    // Firebase初期設定
    firebase.initializeApp({ 
        apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", 
        authDomain: "speed-quiz26.firebaseapp.com", 
        databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "speed-quiz26" 
    });
    const db = firebase.database();
    
    let scenario = [];
    let currentIdx = -1;

    function addQuestionRow(data = null) {
        const div = document.createElement('div');
        div.className = 'q-row';
        const img = data ? (data.image || '') : '';
        const txt = data ? (data.text || '') : '';
        const ans = data ? data.ans : 'A';
        
        div.innerHTML = `
            <div class="q-grid">
                <div class="preview-box">
                    <div class="up-status">UPLOAD中...</div>
                    <img src="${img}" style="${img ? 'display:block' : 'display:none'}">
                </div>
                <div class="input-area">
                    <label class="btn-upload">
                        <i class="fa fa-folder-open"></i> 手元の画像を選択
                        <input type="file" style="display:none" accept="image/*" onchange="uploadToGitHub(this)">
                    </label>
                    <input type="text" class="q-img-url" value="${img}" readonly placeholder="URLは自動入力されます">
                    <textarea class="q-txt" placeholder="画像の下に出すテキストを入力">${txt}</textarea>
                    <div style="margin-top:5px;">
                        正解: <select class="q-ans">${['A','B','C','D','E','F','G'].map(v=>`<option value="${v}" ${ans===v?'selected':''}>${v}</option>`).join('')}</select>
                    </div>
                </div>
            </div>
            <div style="text-align:right;"><button onclick="this.parentElement.parentElement.remove()" style="color:#e74c3c; background:none; border:none; cursor:pointer; font-size:12px;">[削除]</button></div>
        `;
        document.getElementById('questions-container').appendChild(div);
    }

    async function uploadToGitHub(input) {
        const file = input.files[0]; if (!file) return;
        const row = input.closest('.q-row');
        row.querySelector('.up-status').style.display = 'flex';

        const token = document.getElementById('gh-token').value;
        const user = document.getElementById('gh-user').value;
        const repo = document.getElementById('gh-repo').value;

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64Content = reader.result.split(',')[1];
            const fileName = `q_${Date.now()}_${file.name.replace(/\s+/g, '_')}`;
            const path = `images/${fileName}`;

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "upload", content: base64Content })
                });
                const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${path}`;
                row.querySelector('.q-img-url').value = rawUrl;
                row.querySelector('img').src = rawUrl;
                row.querySelector('img').style.display = 'block';
            } catch (e) { alert("GitHubアップロード失敗"); }
            row.querySelector('.up-status').style.display = 'none';
        };
    }

    function saveAll() {
        const qList = [];
        document.querySelectorAll('.q-row').forEach(r => { 
            const img = r.querySelector('.q-img-url').value;
            const txt = r.querySelector('.q-txt').value;
            if (img || txt) qList.push({ image: img, text: txt, ans: r.querySelector('.q-ans').value }); 
        });
        db.ref('quizConfig').set(qList).then(() => { alert("保存しました！"); location.reload(); });
    }

    window.onload = () => {
        db.ref('quizConfig').once('value', s => {
            if (s.val()) { s.val().forEach(d => addQuestionRow(d)); buildScenario(s.val().length); } 
            else { addQuestionRow(); }
        });
    };

    function buildScenario(n) {
        scenario = [{type:'rules',t:'ルール説明'}];
        for(let i=0; i<n; i++) {
            scenario.push({type:i===0?'start':'next',qi:i,t:`第${i+1}問 受付中`}, {type:'close',qi:i,t:`第${i+1}問 正解発表`});
        }
        scenario.push({type:'end',t:'全問終了'}, {type:'details',t:'結果発表'}, {type:'ranking',t:'総合順位'});
    }

    function startFlow() { currentIdx = 0; exec(); }
    function next() { if(currentIdx < scenario.length - 1) { currentIdx++; exec(); } }
    function prev() { if(currentIdx > 0) { currentIdx--; exec(); } }
    function exec() {
        const s = scenario[currentIdx];
        document.getElementById('status-text').innerText = s.t;
        document.getElementById('btn-start').style.display = 'none';
        document.getElementById('nav-btns').style.display = 'flex';
        db.ref('adminCommand').set({ type: s.type, qIndex: s.qi !== undefined ? s.qi : -1, ts: Date.now() });
    }
    function resetGame() { if(confirm("リセット？")) { db.ref('players').remove(); db.ref('answers').remove(); location.reload(); } }
</script>
</body>
</html>
