<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>運営パネル - 保存機能付き</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #1e1e1e; color: #fff; padding: 30px; margin: 0; font-size: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: #f1c40f; font-size: 2.5rem; }
        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; align-items: start; }
        .section { background: #2d2d2d; padding: 35px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); border: 2px solid #444; }
        .section h2 { margin-top: 0; border-bottom: 2px solid #555; padding-bottom: 15px; color: #3498db; font-size: 1.8rem; }
        .q-row { background: #3d3d3d; padding: 25px; border-radius: 12px; margin-bottom: 20px; border-left: 8px solid #3498db; }
        .input-line { margin: 15px 0; display: flex; gap: 20px; align-items: flex-start; }
        textarea.q-txt { flex: 1; padding: 15px; border-radius: 8px; border: 2px solid #555; background: #222; color: #fff; font-size: 20px; height: 250px; line-height: 1.4; resize: vertical; }
        .snd-url { flex: 1; padding: 10px; border: 1px solid #555; background: #111; color: #2ecc71; font-size: 16px; }
        .btn-save { background: #27ae60; color: white; width: 100%; font-size: 26px; margin-top: 25px; padding: 20px; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .btn-control { display: block; width: 100%; margin-bottom: 20px; text-align: center; padding: 25px; font-size: 32px; color: white; border-radius: 12px; cursor: pointer; border: none; }
        .c-rules { background: #8e44ad; } .c-next { background: #e74c3c; }
        .player-list-box { background: #222; padding: 20px; border-radius: 10px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="header">
        <h1>運営パネル</h1>
        <a href="./manual.html" target="_blank" style="color:white; text-decoration:none;">📖 マニュアル</a>
    </div>

    <div class="container">
        <div class="left-column">
            <div class="section" style="margin-bottom: 30px;">
                <h2>🔊 音源URL設定（GitHubに上げた音楽のURLを貼る）</h2>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div>① 締切: <input type="text" id="url-sndRules" class="snd-url" placeholder="https://..."></div>
                    <div>② 開始: <input type="text" id="url-sndStart" class="snd-url" placeholder="https://..."></div>
                    <div>③ 次へ: <input type="text" id="url-sndNext" class="snd-url" placeholder="https://..."></div>
                    <div>④ 終了: <input type="text" id="url-sndEnd" class="snd-url" placeholder="https://..."></div>
                    <div>⑤ 結果: <input type="text" id="url-sndDetails" class="snd-url" placeholder="https://..."></div>
                    <div>⑥ 総合: <input type="text" id="url-sndRanking" class="snd-url" placeholder="https://..."></div>
                </div>
            </div>
            
            <div class="section">
                <h2>📝 クイズ内容の設定</h2>
                <div id="questions-container"></div>
                <button class="btn-save" style="background:#34495e; font-size:20px;" onclick="addQuestionRow()">＋ 問題を追加</button>
                <button class="btn-save" onclick="saveAllConfig()">💾 設定をクラウドに保存して反映</button>
            </div>
        </div>

        <div class="right-column">
            <div class="section">
                <h2>🎮 進行</h2>
                <div id="current-status-text" style="font-size:30px; color:#f1c40f; text-align:center; margin-bottom:20px;">待機中</div>
                <button class="btn-control c-rules" id="btn-rules" onclick="startQuiz()">受付締切</button>
                <div id="nav-group" style="display:none; gap:10px;">
                    <button class="btn-control" style="background:#555; flex:1;" onclick="goPrev()">戻る</button>
                    <button class="btn-control c-next" style="flex:2;" onclick="goNext()">次へ</button>
                </div>
                <div style="margin-top:20px; text-align:center;">参加者: <span id="admin-p-count">0</span>名</div>
                <div class="player-list-box" id="admin-p-list" style="margin-top:10px;"></div>
                <button style="margin-top:30px; background:none; border:1px solid #555; color:#777; width:100%; cursor:pointer;" onclick="resetGame()">参加データリセット</button>
            </div>
        </div>
    </div>
