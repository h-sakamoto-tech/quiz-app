<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>運営パネル (V2) - PC特大版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        /* 全体を大きくスケールアップ */
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #1e1e1e; color: #fff; padding: 30px; margin: 0; font-size: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; color: #f1c40f; font-size: 2.5rem; }
        .manual-btn { background-color: #4b5563; color: white; padding: 15px 30px; border-radius: 10px; text-decoration: none; font-size: 20px; font-weight: bold; border: 2px solid #6b7280; transition: background 0.2s; }
        .manual-btn:hover { background-color: #6b7280; }

        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; align-items: start; }

        .section { background: #2d2d2d; padding: 35px; border-radius: 16px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); border: 2px solid #444; }
        .section h2 { margin-top: 0; border-bottom: 2px solid #555; padding-bottom: 15px; color: #3498db; font-size: 1.8rem; }

        .q-row { background: #3d3d3d; padding: 25px; border-radius: 12px; margin-bottom: 20px; border-left: 8px solid #3498db; }
        .input-line { margin: 15px 0; display: flex; gap: 20px; align-items: center; }
        .input-label { width: 90px; font-weight: bold; color: #ccc; text-align: right; font-size: 20px; }
        input[type="text"] { flex: 1; padding: 15px; border-radius: 8px; border: 2px solid #555; background: #222; color: #fff; font-size: 22px; }
        input[type="file"] { flex: 1; padding: 10px; color: #ccc; font-size: 18px; }
        select { padding: 15px; border-radius: 8px; border: 2px solid #555; background: #222; color: #fff; font-size: 22px; cursor: pointer; }
        
        .btn { padding: 15px 25px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: filter 0.2s; font-size: 20px; }
        .btn:hover { filter: brightness(1.2); }
        .btn-add { background: #34495e; color: white; width: 100%; margin-top: 15px; border: 2px dashed #7f8c8d; font-size: 24px; padding: 20px; }
        .btn-save { background: #27ae60; color: white; width: 100%; font-size: 26px; margin-top: 25px; padding: 20px; box-shadow: 0 6px 0 #1e8449; }
        .btn-save:active { transform: translateY(6px); box-shadow: none; }
        .btn-delete { background: #e74c3c; color: white; padding: 10px 20px; font-size: 18px; margin-left: auto; border-radius: 6px; }

        .control-panel { position: sticky; top: 30px; }
        .btn-control { display: block; width: 100%; margin-bottom: 20px; text-align: left; padding: 25px 30px; font-size: 26px; color: white; border-radius: 12px; border: none; cursor: pointer; box-shadow: 0 6px 0 rgba(0,0,0,0.2); transition: transform 0.1s, box-shadow 0.1s; }
        .btn-control:active { transform: translateY(6px); box-shadow: none; }
        
        .c-rules { background: #8e44ad; } .c-start { background: #e74c3c; } .c-next { background: #e67e22; }
        .c-end { background: #34495e; } .c-details { background: #2980b9; } .c-ranking { background: #f1c40f; color: #333; font-weight: 900; }
        .c-reset { background: #7f8c8d; margin-top: 40px; }

        .sound-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 18px; }
        .sound-item { background: #333; padding: 15px; border-radius: 8px; border: 1px solid #444; }

        .img-preview { max-height: 80px; border-radius: 6px; display: none; margin-left: 15px; border: 3px solid #555; }
        #questions-container { counter-reset: qnum; }
        .q-row-title::before { counter-increment: qnum; content: "【第 " counter(qnum) " 問】"; font-size: 26px; color: #f1c40f; }
    </style>
</head>
<body>
    
    <div class="header">
        <h1><i class="fas fa-cogs"></i> 運営パネル (PC特大版)</h1>
        <a href="Manual.pptx" target="_blank" class="manual-btn">
            <i class="fas fa-file-powerpoint"></i> 運営マニュアルを開く
        </a>
    </div>

    <div class="container">
        <div class="left-column">
            <div class="section" style="margin-bottom: 30px;">
                <h2><i class="fas fa-music"></i> 音源設定</h2>
                <div class="sound-grid">
                    <div class="sound-item">① 締切＆ルール: <input type="file" onchange="loadSnd(this, 'sndRules')"></div>
                    <div class="sound-item">② クイズ開始: <input type="file" onchange="loadSnd(this, 'sndStart')"></div>
                    <div class="sound-item">③ 次へ（正解）: <input type="file" onchange="loadSnd(this, 'sndNext')"></div>
                    <div class="sound-item">④ 終了！表示: <input type="file" onchange="loadSnd(this, 'sndEnd')"></div>
                    <div class="sound-item">⑤ 結果発表: <input type="file" onchange="loadSnd(this, 'sndDetails')"></div>
                    <div class="sound-item">⑥ 総合発表: <input type="file" onchange="loadSnd(this, 'sndRanking')"></div>
                </div>
            </div>
            
            <div class="section">
                <h2><i class="fas fa-edit"></i> クイズ内容の設定</h2>
                <div id="questions-container">
                    <div class="q-row">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <span class="q-row-title" style="font-weight: bold;"></span>
                            <button class="btn btn-delete" onclick="this.parentElement.parentElement.remove()"><i class="fas fa-trash-alt"></i> 削除</button>
                        </div>
                        <div class="input-line">
                            <span class="input-label">問題文</span>
                            <input type="text" class="q-txt" placeholder="問題をここに入力してください">
                        </div>
                        <div class="input-line">
                            <span class="input-label">画　像</span>
                            <input type="file" accept="image/*" onchange="encodeImage(this)">
                            <input type="hidden" class="q-img">
                            <img class="img-preview" src="">
                        </div>
                        <div class="input-line">
                            <span class="input-label">正　解</span>
                            <select class="q-ans">
                                <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="button" class="btn btn-add" onclick="addQuestionRow()"><i class="fas fa-plus"></i> 問題を追加する</button>
                <button type="button" class="btn btn-save" onclick="saveQuizConfig()"><i class="fas fa-cloud-upload-alt"></i> 設定を保存して反映</button>
            </div>
        </div>

        <div class="right-column">
            <div class="section control-panel">
                <h2><i class="fas fa-gamepad"></i> 進行コントロール</h2>
                <p style="font-size: 16px; color: #aaa; margin-bottom: 25px;">※本番は上から順番にクリックしてください。</p>
                
                <button class="btn-control c-rules" onclick="controlGame('rules')">
                    <strong>① 受付締切</strong><br><span style="font-size:18px;font-weight:normal;">ルール説明を表示</span>
                </button>
                
                <button class="btn-control c-start" onclick="controlGame('start')">
                    <strong>② クイズ開始</strong><br><span style="font-size:18px;font-weight:normal;">（第1問を表示）</span>
                </button>
                
                <button class="btn-control c-next" onclick="controlGame('close')" style="background: #e74c3c; border: 3px solid #fff;">
                    <strong>🛑 手動で締め切る</strong><br><span style="font-size:18px;font-weight:normal;">（20秒待たずに正解発表）</span>
                </button>
                
                <button class="btn-control c-next" onclick="controlGame('next')">
                    <strong>③ 次の問題へ</strong><br><span style="font-size:18px;font-weight:normal;">（解答締切・正解表示）</span>
                </button>
                
                <button class="btn-control c-end" onclick="controlGame('end')">
                    <strong>④ 全問終了</strong><br><span style="font-size:18px;font-weight:normal;">（「終了！」を表示）</span>
                </button>
                
                <button class="btn-control c-details" onclick="controlGame('details')">
                    <strong>⑤ 結果発表</strong><br><span style="font-size:18px;font-weight:normal;">（全員の正誤・タイムを表示）</span>
                </button>
                
                <button class="btn-control c-ranking" onclick="controlGame('ranking')">
                    <strong>⑥ 総合発表</strong><br><span style="font-size:18px;font-weight:normal;">（1位〜3位を表示）</span>
                </button>
                
                <button class="btn-control c-reset" onclick="controlGame('reset')">
                    <i class="fas fa-sync-alt"></i> 参加者データのみリセット
                </button>
            </div>
        </div>
    </div>
    
    <audio id="sndRules"></audio>
    <audio id="sndStart"></audio>
    <audio id="sndNext"></audio>
    <audio id="sndEnd"></audio>
    <audio id="sndDetails"></audio>
    <audio id="sndRanking"></audio>
    
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0",
            authDomain: "speed-quiz26.firebaseapp.com",
            databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "speed-quiz26"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        
        function addQuestionRow() {
            const div = document.createElement('div');
            div.className = 'q-row';
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <span class="q-row-title" style="font-weight: bold;"></span>
                    <button class="btn btn-delete" onclick="this.parentElement.parentElement.remove()"><i class="fas fa-trash-alt"></i> 削除</button>
                </div>
                <div class="input-line">
                    <span class="input-label">問題文</span>
                    <input type="text" class="q-txt" placeholder="問題をここに入力してください">
                </div>
                <div class="input-line">
                    <span class="input-label">画　像</span>
                    <input type="file" accept="image/*" onchange="encodeImage(this)">
                    <input type="hidden" class="q-img">
                    <img class="img-preview" src="">
                </div>
                <div class="input-line">
                    <span class="input-label">正　解</span>
                    <select class="q-ans">
                        <option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option>
                    </select>
                </div>`;
            document.getElementById('questions-container').appendChild(div);
        }
        
        function encodeImage(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;
            if(file.size > 2 * 1024 * 1024) {
                alert("画像サイズが大きすぎます！ 2MB以下の画像を選んでください。");
                fileInput.value = "";
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                const inputLine = fileInput.parentElement;
                inputLine.querySelector('.q-img').value = e.target.result;
                const previewImg = inputLine.querySelector('.img-preview');
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function loadSnd(i, id) { if(i.files[0]) document.getElementById(id).src = URL.createObjectURL(i.files[0]); }
        
        function saveQuizConfig() {
            const data = [];
            document.querySelectorAll('.q-row').forEach(r => {
                data.push({ text: r.querySelector('.q-txt').value, img: r.querySelector('.q-img').value, ans: r.querySelector('.q-ans').value });
            });
            db.ref('quizConfig').set(data).then(() => alert("✅ 設定を保存しました！"));
        }
        
        function controlGame(a) {
            if(a==='reset'){ 
                if(confirm("参加者データと進行状況をリセットしますか？\n（画面上の問題設定や効果音はそのまま残ります）")) {
                    Promise.all([
                        db.ref('players').remove(),
                        db.ref('answers').remove(),
                        db.ref('adminCommand').remove()
                    ]).then(() => {
                        alert("リセット完了しました。クイズの進行は最初に戻ります。");
                    });
                }
                return; 
            }
            
            try {
                if(a==='rules') document.getElementById('sndRules').play();
                if(a==='start') document.getElementById('sndStart').play();
                if(a==='next') document.getElementById('sndNext').play();
                if(a==='end') document.getElementById('sndEnd').play();
                if(a==='details') document.getElementById('sndDetails').play();
                if(a==='ranking') document.getElementById('sndRanking').play();
                if(a==='close') document.getElementById('sndRules').play(); 
            } catch(e) {
                console.log("音が設定されていないか、再生エラーです");
            }
            
            db.ref('adminCommand').set({ type: a, ts: Date.now() });
        }

        db.ref('adminCommand').on('value', snap => {
            const cmd = snap.val();
            if (cmd && cmd.type === 'close' && cmd.auto === true) {
                try {
                    document.getElementById('sndRules').play();
                } catch(e) {}
            }
        });
    </script>
</body>
</html>
