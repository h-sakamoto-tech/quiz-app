<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>運営パネル (V2)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <div style="text-align: right; margin-bottom: 20px;">
        <a href="manual.pptx" target="_blank" style="background-color: #4b5563; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; border: 1px solid #6b7280;">
            <i class="fas fa-file-powerpoint"></i> 運営マニュアルを開く
        </a>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
        .section { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        .q-row { background: #444; padding: 15px; border-radius: 5px; margin-bottom: 10px; }
        .input-line { margin: 5px 0; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 8px; border-radius: 4px; border: none; }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-add { background: #3498db; color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        .btn-save { background: #27ae60; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        .btn-next { background: #e94560; color: white; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; margin: 0; font-size: 12px; }
        .img-preview { max-height: 50px; border-radius: 4px; display: none; margin-left: 10px; }
        
        /* 自動で問題番号を振るための設定 */
        #questions-container { counter-reset: qnum; }
        .q-row-title::before { counter-increment: qnum; content: "【第 " counter(qnum) " 問】"; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <h1>⚙️ 運営パネル (V2)</h1>
    
    <div class="section">
        <h2>🎵 音源設定</h2>
        <div>開始音: <input type="file" onchange="loadSnd(this, 'sndStart')"></div>
        <div>正解音: <input type="file" onchange="loadSnd(this, 'sndCorrect')"></div>
        <div>時間切: <input type="file" onchange="loadSnd(this, 'sndTimeout')"></div>
    </div>
    
    <div class="section">
        <h2>🖼️ クイズ内容の設定</h2>
        <div id="questions-container">
            <div class="q-row">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span class="q-row-title"></span>
                    <button class="btn btn-delete" onclick="this.parentElement.parentElement.remove()">🗑️ 削除</button>
                </div>
                <div class="input-line">問題文: <input type="text" class="q-txt"></div>
                <div class="input-line">
                    画像: 
                    <input type="file" accept="image/*" onchange="encodeImage(this)" style="flex: 1;">
                    <input type="hidden" class="q-img">
                    <img class="img-preview" src="">
                </div>
                <div class="input-line">正解: 
                    <select class="q-ans">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="G">G</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-add" onclick="addQuestionRow()">＋ 問題を追加する</button>
        <button type="button" class="btn btn-save" onclick="saveQuizConfig()">設定を保存して反映</button>
    </div>
    
    <div class="section">
        <h2>🎮 進行管理</h2>
        <button class="btn btn-next" onclick="controlGame('close')">① 締め切り</button>
        <button class="btn btn-next" onclick="controlGame('start')">② 開始</button>
        <button class="btn btn-next" onclick="controlGame('next')">③ 次へ</button>
        <button class="btn btn-next" onclick="controlGame('result')">④ 結果表示</button>
        <button class="btn" style="background:#777" onclick="controlGame('reset')">🔄 参加者だけリセット</button>
    </div>
    
    <audio id="sndStart"></audio><audio id="sndCorrect"></audio><audio id="sndTimeout"></audio>
    
    <script>
        var firebaseConfig = {
            apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0",
            authDomain: "speed-quiz26.firebaseapp.com",
            databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "speed-quiz26"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();
        
        function addQuestionRow() {
            const div = document.createElement('div');
            div.className = 'q-row';
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span class="q-row-title"></span>
                    <button class="btn btn-delete" onclick="this.parentElement.parentElement.remove()">🗑️ 削除</button>
                </div>
                <div class="input-line">問題文: <input type="text" class="q-txt"></div>
                <div class="input-line">画像: <input type="file" accept="image/*" onchange="encodeImage(this)" style="flex: 1;"><input type="hidden" class="q-img"><img class="img-preview" src=""></div>
                <div class="input-line">正解: <select class="q-ans"><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option></select></div>`;
            document.getElementById('questions-container').appendChild(div);
        }
        
        function encodeImage(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;
            
            if(file.size > 2 * 1024 * 1024) {
                alert("画像サイズが大きすぎます！ 2MB以下の画像を選んでください。");
                fileInput.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const inputLine = fileInput.parentElement;
                inputLine.querySelector('.q-img').value = e.target.result;
                
                const previewImg = inputLine.querySelector('.img-preview');
                previewImg.src = e.target.result;
                previewImg.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function loadSnd(i, id) { if(i.files[0]) document.getElementById(id).src = URL.createObjectURL(i.files[0]); }
        
        function saveQuizConfig() {
            const data = [];
            // 画面に残っている問題だけを集めて保存します
            document.querySelectorAll('.q-row').forEach(r => {
                data.push({ text: r.querySelector('.q-txt').value, img: r.querySelector('.q-img').value, ans: r.querySelector('.q-ans').value });
            });
            db.ref('quizConfig').set(data).then(() => alert("設定を保存しました！"));
        }
        
        function controlGame(a) {
            if(a==='reset'){ 
                if(confirm("参加者データと進行状況をリセットしますか？\n（画面上の問題設定や効果音はそのまま残ります）")) {
                    Promise.all([
                        db.ref('players').remove(),
                        db.ref('adminCommand').remove(),
                        db.ref('status').remove()
                    ]).then(() => {
                        // 【重要】画面をリロードしないように修正しました
                        alert("参加者データをリセットしました。クイズの進行は最初に戻ります。");
                    });
                }
                return; 
            }
            if(a==='start') document.getElementById('sndStart').play();
            if(a==='next') document.getElementById('sndCorrect').play();
            db.ref('adminCommand').set({ type: a, ts: Date.now() });
        }
        
        db.ref('status/playTimeout').on('value', snap => { 
            if(snap.val()===true){ 
                document.getElementById('sndTimeout').play(); 
                db.ref('status/playTimeout').set(false); 
            } 
        });
    </script>
</body>
</html>
