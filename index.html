<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>運営パネル (V2)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <div style="text-align: right; margin-bottom: 20px;">
        <a href="manual.pptx" target="_blank" style="background-color: #4b5563; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; font-size: 14px; border: 1px solid #6b7280;">
            <i class="fas fa-file-powerpoint"></i> 運営マニュアルを開く
        </a>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; padding: 20px; }
        .section { background: #333; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; }
        .q-row { background: #444; padding: 15px; border-radius: 5px; margin-bottom: 10px; }
        .input-line { margin: 5px 0; display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; padding: 8px; border-radius: 4px; border: none; }
        .btn { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .btn-add { background: #3498db; color: white; width: 100%; font-size: 18px; margin-top: 10px; }
        .btn-save { background: #27ae60; color: white; width: 100%; font-size: 16px; margin-top: 10px; }
        /* 進行ボタンのデザイン調整 */
        .btn-next { background: #e94560; color: white; display: block; width: 100%; margin: 10px 0; text-align: left; font-size: 16px; padding: 15px;}
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; margin: 0; font-size: 12px; }
        .img-preview { max-height: 50px; border-radius: 4px; display: none; margin-left: 10px; }
        
        #questions-container { counter-reset: qnum; }
        .q-row-title::before { counter-increment: qnum; content: "【第 " counter(qnum) " 問】"; font-weight: bold; font-size: 18px; }
        
        /* 音源設定を2列にしてスッキリさせる */
        .sound-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <h1>⚙️ 運営パネル (V2)</h1>
    
    <div class="section">
        <h2>🎵 音源設定（全シーン対応）</h2>
        <div class="sound-grid">
            <div>① 締切＆ルール音: <input type="file" onchange="loadSnd(this, 'sndRules')"></div>
            <div>② クイズ開始音: <input type="file" onchange="loadSnd(this, 'sndStart')"></div>
            <div>③ 次へ（正解）音: <input type="file" onchange="loadSnd(this, 'sndNext')"></div>
            <div>④ 終了！表示音: <input type="file" onchange="loadSnd(this, 'sndEnd')"></div>
            <div>⑤ 結果発表音: <input type="file" onchange="loadSnd(this, 'sndDetails')"></div>
            <div>⑥ 総合発表音: <input type="file" onchange="loadSnd(this, 'sndRanking')"></div>
        </div>
    </div>
    
    <div class="section">
        <h2>🖼️ クイズ内容の設定</h2>
        <div id="questions-container">
            <div class="q-row">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <span class="q-row-title"></span>
                    <button class="btn btn-delete" onclick="this.parentElement.parentElement.remove()">🗑️ 削除</button>
                </div>
                <div class="input-line">問題文: <input type="text" class="q-txt"></div>
                <div class="input-line">
                    画像: 
                    <input type="file" accept="image/*" onchange="encodeImage(this)" style="flex: 1;">
                    <input type="hidden" class="q-img">
                    <img class="img-preview" src="">
                </div>
                <div class="input-line">正解: 
                    <select class="q-ans">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                        <option value="E">E</option>
                        <option value="F">F</option>
                        <option value="G">G</option>
                    </select>
                </div>
            </div>
        </div>
        <button type="button" class="btn btn-add" onclick="addQuestionRow()">＋ 問題を追加する</button>
        <button type="button" class="btn btn-save" onclick="saveQuizConfig()">設定を保存して反映</button>
    </div>
    
    <div class="section">
        <h2>🎮 進行管理（本番シナリオ順）</h2>
        <button class="btn btn-next" onclick="controlGame('rules')">① 受付締切 ＆ ルール説明を表示</button>
        <button class="btn btn-next" onclick="controlGame('start')">② クイズ開始（第1問を表示）</button>
        <button class="btn btn-next" onclick="controlGame('next')">③ 次へ（解答締切・正解表示・次の問題へ）</button>
        <button class="btn btn-next" style="background: #8e44ad;" onclick="controlGame('end')">④ 全問終了（「終了！」を表示）</button>
        <button class="btn btn-next" style="background: #2980b9;" onclick="controlGame('details')">⑤ 結果発表（全員の正誤・タイムを表示）</button>
        <button class="btn btn-next" style="background: #f39c12;" onclick="controlGame('ranking')">⑥ 総合発表（1位〜3位を表示）</button>
        
        <hr style="border-color: #555; margin: 20px 0;">
        <button class="btn" style="background:#777; width: 100%;" onclick="controlGame('reset')">🔄 参加者と進行データだけリセット</button>
    </div>
