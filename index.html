<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ管理画面</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #f1c40f; padding-bottom: 10px; }
        .header h1 { color: #f1c40f; margin: 0; font-size: 2.5rem; }
        .section { background: #2d2d2d; padding: 25px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; }
        
        .sound-grid { display: grid; gap: 10px; margin-top: 15px; }
        .sound-row { background: #333; padding: 15px; border-radius: 8px; border: 1px solid #555; }
        .sound-header { display: flex; justify-content: space-between; align-items: center; color: #f1c40f; font-weight: bold; margin-bottom: 8px; }
        .url-input { width: 100%; padding: 8px; background: #111; color: #2ecc71; border: 1px solid #555; font-size: 14px; border-radius: 4px; box-sizing: border-box; }
        
        .q-row { background: #3d3d3d; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #3498db; }
        textarea { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid #555; padding: 10px; font-size: 16px; box-sizing: border-box; resize: vertical; }
        .btn-save { background: #27ae60; color: white; width: 100%; padding: 20px; font-size: 24px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        .btn-add { background: #34495e; color: white; width: 100%; padding: 15px; border: 2px dashed #7f8c8d; cursor: pointer; margin-top: 10px; font-size: 18px; border-radius: 8px; }
        .btn-control { width: 100%; padding: 20px; font-size: 28px; color: white; border-radius: 10px; cursor: pointer; border: none; margin-bottom: 15px; }
        .status-display { background: #111; padding: 15px; border: 1px solid #f1c40f; text-align: center; margin-bottom: 15px; border-radius: 8px; }
        
        /* 📊 フルサイズ詳細結果テーブル */
        .table-container { width: 100%; overflow-x: auto; background: #222; border-radius: 8px; border: 1px solid #444; padding: 10px; box-sizing: border-box; }
        .result-table { width: 100%; border-collapse: collapse; font-size: 16px; text-align: center; }
        .result-table th { background: #444; color: #f1c40f; border: 1px solid #555; padding: 12px; white-space: nowrap; position: sticky; top: 0; z-index: 1;}
        .result-table td { border: 1px solid #555; padding: 10px; white-space: nowrap; }
        .mark-o { color: #2ecc71; font-weight: bold; font-size: 20px; }
        .mark-x { color: #e74c3c; font-weight: bold; font-size: 20px; }
        .time-sec { font-size: 12px; color: #aaa; }

        /* 📡 右側のリアルタイムパネル用スクロール */
        .live-status-box {
            display: flex; flex-direction: column; gap: 5px; 
            max-height: 350px; overflow-y: auto; padding-right: 5px;
        }
    </style>
</head>
<body>

<div class="header"><h1>スピードクイズ管理画面</h1></div>

<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
    <div>
        <div class="section">
            <h2>🔊 音源一括設定</h2>
            <div style="background: #111; padding: 15px; border-radius: 8px; border: 2px solid #3498db;">
                <p style="margin-top:0; font-weight:bold; color:#3498db;">GitHubフォルダURL</p>
                <input type="text" id="base-folder-url" class="url-input" placeholder="例: https://h-sakamoto-tech.github.io/quiz-app/sounds/" onchange="autoFillUrls()">
            </div>
            
            <div class="sound-grid">
                <div class="sound-row"><div class="sound-header"><span>① 締切＆ルール</span><input type="file" onchange="previewSnd(this, 'sndRules', 'url-sndRules')"></div><input type="text" id="url-sndRules" class="url-input" placeholder="自動入力されます"></div>
                <div class="sound-row"><div class="sound-header"><span>② クイズ開始</span><input type="file" onchange="previewSnd(this, 'sndStart', 'url-sndStart')"></div><input type="text" id="url-sndStart" class="url-input" placeholder="自動入力されます"></div>
                <div class="sound-row"><div class="sound-header"><span>③ 次へ（正解）</span><input type="file" onchange="previewSnd(this, 'sndNext', 'url-sndNext')"></div><input type="text" id="url-sndNext" class="url-input" placeholder="自動入力されます"></div>
                <div class="sound-row"><div class="sound-header"><span>④ 終了表示</span><input type="file" onchange="previewSnd(this, 'sndEnd', 'url-sndEnd')"></div><input type="text" id="url-sndEnd" class="url-input" placeholder="自動入力されます"></div>
                <div class="sound-row"><div class="sound-header"><span>⑤ 結果発表</span><input type="file" onchange="previewSnd(this, 'sndDetails', 'url-sndDetails')"></div><input type="text" id="url-sndDetails" class="url-input" placeholder="自動入力されます"></div>
                <div class="sound-row"><div class="sound-header"><span>⑥ 総合順位</span><input type="file" onchange="previewSnd(this, 'sndRanking', 'url-sndRanking')"></div><input type="text" id="url-sndRanking" class="url-input" placeholder="自動入力されます"></div>
            </div>
        </div>

        <div class="section">
            <h2>📝 クイズ問題の設定</h2>
            <div id="questions-container"></div>
            <button type="button" class="btn-add" onclick="addQuestionRow()">＋ 問題を追加</button>
            <button type="button" class="btn-save" onclick="saveAllConfig()">💾 設定を保存して反映</button>
        </div>
    </div>

    <div>
        <div class="section" style="position: sticky; top: 20px;">
            <h2>🎮 進行管理</h2>
            <div class="status-display">
                <div style="font-size:14px; color:#aaa;">現在の状態</div>
                <div id="current-status-text" style="font-size:24px; color:#f1c40f; font-weight:bold;">待機中 (QR表示)</div>
            </div>
            
            <button class="btn-control" style="background:#8e44ad;" id="btn-start-flow" onclick="startQuizFlow()">🚀 クイズ開始 (ルール説明)</button>

            <div id="nav-group" style="display:none; gap:10px;">
                <button class="btn-control" style="background:#555; flex:1; font-size:20px;" onclick="goPrev()">戻る</button>
                <button class="btn-control" style="background:#e74c3c; flex:2; font-size:24px;" onclick="goNext()">次へ進む</button>
            </div>

            <div style="margin-top:20px; background:#111; padding:15px; border-radius:8px; border:1px solid #444;">
                <h3 style="margin:0 0 10px 0; font-size:18px; color:#3498db; display:flex; justify-content:space-between; align-items:center;">
                    <span>📡 回答状況</span>
                    <span style="font-size:14px; color:#aaa; font-weight:normal;">参加: <span id="admin-p-count" style="color:#fff; font-weight:bold;">0</span> チーム</span>
                </h3>
                <div id="admin-live-status" class="live-status-box">
                    <div style="color:#aaa; text-align:center; padding:10px;">※参加者が登録すると表示されます</div>
                </div>
            </div>
            
            <button onclick="resetGame()" style="margin-top:30px; background:none; border:1px solid #555; color:#777; width:100%; cursor:pointer; padding:5px;">全データをリセット</button>
        </div>
    </div>
</div>

<div class="section" style="margin-top: 30px;">
    <h2 style="color:#3498db;">📊 チーム別 詳細結果表（正誤・タイム）</h2>
    <div class="table-container" id="admin-detailed-results">
        <div style="color:#aaa; text-align:center; padding:20px;">※参加者が登録するとここに表示されます</div>
    </div>
</div>

<audio id="sndRules"></audio><audio id="sndStart"></audio><audio id="sndNext"></audio>
<audio id="sndEnd"></audio><audio id="sndDetails"></audio><audio id="sndRanking"></audio>

<script>
    var firebaseConfig = { apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", authDomain: "speed-quiz26.firebaseapp.com", databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "speed-quiz26" };
    firebase.initializeApp(firebaseConfig); var db = firebase.database();
    
    let scenario = []; let currentStepIndex = -1;
    let currentAnswers = {}; let playersData = {}; let currentQuestionStartTs = 0;
    let globalQCount = 0;

    // ★ リアルタイム状況パネルを更新
    function updateLiveStatus() {
        const container = document.getElementById('admin-live-status');
        if (!container) return;
        
        let isAccepting = false;
        if (currentStepIndex >= 0 && scenario[currentStepIndex]) {
            isAccepting = (scenario[currentStepIndex].type === 'start' || scenario[currentStepIndex].type === 'next');
        }

        let html = '';
        for (let uid in playersData) {
            let p = playersData[uid];
            
            if (isAccepting) {
                // 回答データがあれば「回答済」
                let hasAnswered = (currentAnswers[uid] && currentAnswers[uid].choice);
                if (hasAnswered) {
                    html += `<div style="display:flex; justify-content:space-between; background:#27ae60; padding:8px 12px; border-radius:5px;"><span>${p.name}</span><span style="font-weight:bold;">回答済</span></div>`;
                } else {
                    html += `<div style="display:flex; justify-content:space-between; background:#c0392b; padding:8px 12px; border-radius:5px;"><span>${p.name}</span><span style="font-weight:bold;">未回答</span></div>`;
                }
            } else {
                html += `<div style="display:flex; justify-content:space-between; background:#2980b9; padding:8px 12px; border-radius:5px;"><span>${p.name}</span><span style="font-weight:bold;">${p.score||0} pt</span></div>`;
            }
        }
        
        if (html === '') html = '<div style="color:#aaa; text-align:center; padding:10px;">※参加者が登録すると表示されます</div>';
        container.innerHTML = html;
    }

    db.ref('answers').on('value', snap => {
        currentAnswers = snap.val() || {};
        updateLiveStatus();
    });

    db.ref('players').on('value', snap => {
        playersData = snap.val() || {};
        const pCount = Object.keys(playersData).length;
        document.getElementById('admin-p-count').innerText = pCount;
        updateLiveStatus(); 
        
        // フルサイズテーブルの描画
        if (globalQCount > 0 && pCount > 0) {
            let tableHtml = `<table class="result-table"><tr><th>順位</th><th style="text-align:left;">チーム名</th><th>合計</th>`;
            for (let i = 0; i < globalQCount; i++) { tableHtml += `<th>Q${i+1}</th>`; }
            tableHtml += `</tr>`;

            let sortedPlayers = Object.values(playersData).sort((a,b) => (b.score || 0) - (a.score || 0));

            sortedPlayers.forEach((p, index) => {
                tableHtml += `<tr><td>${index+1}</td><td style="text-align:left; font-weight:bold;">${p.name}</td><td style="color:#f1c40f; font-weight:bold; font-size:20px;">${p.score || 0}</td>`;
                for (let i = 0; i < globalQCount; i++) {
                    let h = p.history ? p.history[i] : null;
                    if (h) {
                        let mark = h.correct ? '<span class="mark-o">〇</span>' : '<span class="mark-x">✖</span>';
                        if (h.choice === '未') mark = '<span style="color:#aaa;">-</span>';
                        let timeStr = h.time !== '--' ? `${h.time}秒` : '--';
                        tableHtml += `<td>${mark}<br><span class="time-sec">${timeStr}</span></td>`;
                    } else { tableHtml += `<td>-</td>`; }
                }
                tableHtml += `</tr>`;
            });
            tableHtml += `</table>`;
            document.getElementById('admin-detailed-results').innerHTML = tableHtml;
        }
    });

    window.onload = function() {
        db.ref('soundConfig').once('value', snap => {
            const snds = snap.val() || {};
            if(snds.baseUrl) document.getElementById('base-folder-url').value = snds.baseUrl;
            ['sndRules','sndStart','sndNext','sndEnd','sndDetails','sndRanking'].forEach(id => { if(snds[id]) document.getElementById('url-' + id).value = snds[id]; });
        });
        db.ref('quizConfig').once('value', snap => {
            const data = snap.val();
            if (data && data.length > 0) { 
                globalQCount = data.length;
                data.forEach(q => addQuestionRow(q)); 
                buildScenario(data.length); 
            } else { addQuestionRow(); }
        });
    };

    function autoFillUrls() {
        const base = document.getElementById('base-folder-url').value.trim(); if(!base) return;
        const fix = base.endsWith('/') ? base : base + '/';
        const files = {sndRules: "rules.mp3", sndStart: "start.mp3", sndNext: "next.mp3", sndEnd: "end.mp3", sndDetails: "details.mp3", sndRanking: "ranking.mp3"};
        for(let id in files) { document.getElementById('url-' + id).value = fix + files[id]; }
    }

    function previewSnd(input, audioId, urlInputId) {
        if(input.files[0]) {
            const url = URL.createObjectURL(input.files[0]);
            const a = document.getElementById(audioId); a.src = url; a.play();
            const base = document.getElementById('base-folder-url').value.trim();
            if(base) { document.getElementById(urlInputId).value = (base.endsWith('/') ? base : base + '/') + input.files[0].name; }
        }
    }

    window.addQuestionRow = function(qData = null) {
        const container = document.getElementById('questions-container');
        const div = document.createElement('div'); div.className = 'q-row';
        div.innerHTML = `<textarea class="q-txt" placeholder="問題文">${qData?qData.text:''}</textarea><br>正解:<select class="q-ans">${['A','B','C','D','E','F','G'].map(v=>`<option value="${v}" ${qData&&qData.ans===v?'selected':''}>${v}</option>`).join('')}</select> <button onclick="this.parentElement.remove()" style="color:#e74c3c; background:none; border:none; cursor:pointer; font-weight:bold;">[削除]</button>`;
        container.appendChild(div);
    };

    function saveAllConfig() {
        const qData = []; document.querySelectorAll('.q-row').forEach(r => { 
            const txt = r.querySelector('.q-txt').value; if(txt) qData.push({ text: txt, ans: r.querySelector('.q-ans').value }); 
        });
        const sData = { baseUrl: document.getElementById('base-folder-url').value, sndRules: document.getElementById('url-sndRules').value, sndStart: document.getElementById('url-sndStart').value, sndNext: document.getElementById('url-sndNext').value, sndEnd: document.getElementById('url-sndEnd').value, sndDetails: document.getElementById('url-sndDetails').value, sndRanking: document.getElementById('url-sndRanking').value };
        db.ref('quizConfig').set(qData); db.ref('soundConfig').set(sData).then(() => { alert("保存しました！"); location.reload(); });
    }

    function buildScenario(n) {
        scenario = [{type:'rules',title:'ルール説明'}];
        for(let i=0;i<n;i++) { 
            scenario.push({type:i===0?'start':'next',qIndex:i,title:`第${i+1}問 受付中`});
            scenario.push({type:'close',qIndex:i,title:`第${i+1}問 正解発表`});
        }
        scenario.push({type:'end',title:'全問終了'},{type:'details',title:'結果一覧(詳細)'});
    }

    function executeStep() {
        if (!scenario[currentStepIndex]) return;
        const step = scenario[currentStepIndex];
        const now = Date.now();
        document.getElementById('current-status-text').innerText = step.title;
        document.getElementById('btn-start-flow').style.display = 'none';
        document.getElementById('nav-group').style.display = 'flex';

        if (step.type === 'start' || step.type === 'next') {
            currentQuestionStartTs = now; 
            // 出題の瞬間に古い回答をクリア
            db.ref('answers').remove().then(() => {
                db.ref('adminCommand').set({ type: step.type, qIndex: step.qIndex, ts: now });
                updateLiveStatus();
            });
        } else if (step.type === 'close') {
            db.ref('quizConfig').once('value').then(snap => {
                const qData = snap.val() || [];
                const correctAns = qData[step.qIndex]?.ans;
                let updates = {};
                
                for (let uid in playersData) {
                    let p = playersData[uid];
                    let ans = currentAnswers[uid];
                    
                    let hInfo = { choice: '未', correct: false, time: '--', points: 0 };
                    
                    // ★ タイム計算の強力バックアップシステム
                    if (ans && ans.choice) {
                        let elapsed = 60; // 初期値
                        
                        // 1. スマホが送ってきたタイムがあればそれを優先
                        if (ans.time !== undefined) {
                            elapsed = ans.time;
                        } 
                        // 2. なければ、管理画面の時計で「出題から今までの秒数」を計算
                        else if (ans.ts && currentQuestionStartTs) {
                            elapsed = Math.floor((ans.ts - currentQuestionStartTs) / 1000);
                        }
                        
                        // 異常な数値を防ぐガード
                        if (elapsed < 0) elapsed = 0;
                        if (elapsed > 60) elapsed = 60;

                        let isCorrect = (ans.choice === correctAns);
                        // 100点 + ボーナス（60秒 - かかった秒数）
                        let points = isCorrect ? 100 + Math.max(0, 60 - elapsed) : 0;
                        hInfo = { choice: ans.choice, correct: isCorrect, time: elapsed, points: points };
                    }
                    
                    updates[`${uid}/history/${step.qIndex}`] = hInfo;
                    
                    let totalScore = 0; let historyObj = p.history || {};
                    historyObj[step.qIndex] = hInfo; 
                    for (let q in historyObj) { totalScore += (historyObj[q].points || 0); }
                    updates[`${uid}/score`] = totalScore;
                }
                
                if (Object.keys(updates).length > 0) db.ref('players').update(updates);
                db.ref('adminCommand').set({ type: step.type, qIndex: step.qIndex, ts: now });
                updateLiveStatus();
            });
        } else {
            db.ref('adminCommand').set({ type: step.type, qIndex: step.qIndex !== undefined ? step.qIndex : -1, ts: now });
            updateLiveStatus();
        }
    }

    function startQuizFlow() { if(scenario.length <= 1) return alert("問題を保存してください！"); currentStepIndex = 0; executeStep(); }
    function goNext() { if (currentStepIndex < scenario.length - 1) { currentStepIndex++; executeStep(); } }
    function goPrev() { if (currentStepIndex > 0) { currentStepIndex--; executeStep(); } }
    function resetGame() { if(confirm("全てリセットしますか？")) { db.ref('adminCommand').set({ type: 'reset', ts: Date.now() }); db.ref('players').remove(); db.ref('answers').remove(); location.reload(); } }
</script>
</body>
</html>
