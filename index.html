<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Cyber Speed Quiz - Image Mode</title>
    <style>
        /* 全体のサイバーデザイン */
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #quiz-card {
            background: #1a202c;
            width: 90%;
            max-width: 600px;
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.3);
            text-align: center;
        }

        /* 🖼️ 画像表示エリア */
        #image-container {
            width: 100%;
            height: 300px;
            background: #000;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid #333;
        }

        #q-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none; /* 初期状態は隠す */
        }

        /* 📝 画像下のテキストエリア */
        #q-text {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 25px;
            color: #2ecc71;
            min-height: 1.6em;
        }

        /* 🔘 回答ボタン */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .option-btn {
            background: transparent;
            border: 2px solid #2ecc71;
            color: #2ecc71;
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .option-btn:hover {
            background: #2ecc71;
            color: #0b0e14;
        }

        /* タイマーバー */
        #timer-box {
            width: 100%;
            height: 10px;
            background: #333;
            margin-top: 20px;
            border-radius: 5px;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: #e74c3c;
            transition: linear;
        }
    </style>
</head>
<body>

<div id="quiz-card">
    <div style="font-size: 0.8rem; color: #8892b0; margin-bottom: 10px;">QUESTION <span id="q-num">1</span></div>

    <div id="image-container">
        <img id="q-image" src="" alt="Quiz Image">
    </div>

    <div id="q-text">画像を読み込み中...</div>

    <div class="options-grid" id="options-container">
        </div>

    <div id="timer-box">
        <div id="timer-bar"></div>
    </div>
</div>

<script>
    // ==========================================
    // 📝 クイズデータの設定（ここを編集！）
    // ==========================================
    const quizData = [
        {
            image: "images/plane.jpg", // 画像のファイル名
            text: "この航空機の名前は何？",   // 画像の下のテキスト
            options: ["ボーイング787", "エアバスA350", "政府専用機", "オスプレイ"],
            answer: "ボーイング787"
        },
        {
            image: "images/map.png",
            text: "この地域で発生した地震の規模は？",
            options: ["M6.5", "M7.2", "M8.1", "M9.0"],
            answer: "M8.1"
        },
        {
            image: "images/code.png",
            text: "このプログラムの言語は何？",
            options: ["Python", "HTML", "JavaScript", "C++"],
            answer: "HTML"
        }
    ];

    let currentIdx = 0;
    const qImage = document.getElementById('q-image');
    const qText = document.getElementById('q-text');
    const qNum = document.getElementById('q-num');
    const optionsContainer = document.getElementById('options-container');

    // クイズを表示する関数
    function loadQuestion() {
        const data = quizData[currentIdx];
        
        // 画像のセット
        if (data.image) {
            qImage.src = data.image;
            qImage.style.display = "block";
        } else {
            qImage.style.display = "none";
        }

        // テキストのセット
        qText.innerText = data.text;
        qNum.innerText = currentIdx + 1;

        // ボタンの生成
        optionsContainer.innerHTML = "";
        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt);
            optionsContainer.appendChild(btn);
        });
    }

    // 正誤判定
    function checkAnswer(selected) {
        if (selected === quizData[currentIdx].answer) {
            alert("正解！ CORRECT");
        } else {
            alert("不正解！ WRONG");
        }
        
        // 次の問題へ
        currentIdx++;
        if (currentIdx < quizData[currentIdx - 1].answer) { // 次があるかチェック
             // (簡易的にループさせる場合は currentIdx = 0 に戻す処理など)
        }
        
        // 実際にはここで次の問題へ切り替える処理が入ります
        if(currentIdx < quizData.length) {
            loadQuestion();
        } else {
            alert("全問終了！");
        }
    }

    // 最初の問題を開始
    loadQuestion();
</script>

</body>
</html>
