<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スピードクイズ - 参加者画面</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #0b0e14; color: #fff; margin: 0; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        
        /* 🖼️ 設問画像表示エリア */
        .q-image-container {
            width: 100%;
            max-height: 250px;
            background: #000;
            margin-bottom: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #333;
        }
        .q-image-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
        }

        /* 📝 設問テキスト（画像の下） */
        .q-text {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: #2ecc71;
            line-height: 1.4;
        }

        /* 🔘 回答ボタンのグリッド */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .opt-btn {
            background: #1a202c;
            border: 2px solid #2ecc71;
            color: #2ecc71;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }
        .opt-btn:active { background: #2ecc71; color: #0b0e14; }
        .opt-btn:disabled { border-color: #444; color: #444; cursor: not-allowed; }

        .status-msg { margin-top: 20px; color: #8892b0; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-area" style="display:none;">
        <h2 id="q-header">第1問</h2>
        
        <div class="q-image-container" id="img-wrap" style="display:none;">
            <img id="display-img" src="">
        </div>

        <div class="q-text" id="display-text"></div>

        <div class="options-grid">
            <button class="opt-btn" onclick="sendAnswer('A')">A</button>
            <button class="opt-btn" onclick="sendAnswer('B')">B</button>
            <button class="opt-btn" onclick="sendAnswer('C')">C</button>
            <button class="opt-btn" onclick="sendAnswer('D')">D</button>
        </div>
    </div>

    <div id="wait-area">
        <h1 style="color: #f1c40f;">待機中...</h1>
        <p>管理者がクイズを開始するまでお待ちください。</p>
    </div>
</div>

<script>
    // Firebase初期設定（管理画面と同じものを入れてください）
    var firebaseConfig = { 
        apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", 
        authDomain: "speed-quiz26.firebaseapp.com", 
        databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "speed-quiz26" 
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    let currentQIndex = -1;
    let myUid = "user_" + Math.random().toString(36).substring(2, 9); // 簡易的なユーザーID生成

    // 管理者からの命令（adminCommand）を監視
    db.ref('adminCommand').on('value', snap => {
        const cmd = snap.val();
        if (!cmd) return;

        if (cmd.type === 'start' || cmd.type === 'next') {
            currentQIndex = cmd.qIndex;
            showQuestion(cmd.qIndex);
        } else if (cmd.type === 'reset') {
            location.reload();
        } else {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('wait-area').style.display = 'block';
        }
    });

    // 設問を表示する関数
    function showQuestion(index) {
        db.ref('quizConfig/' + index).once('value', snap => {
            const data = snap.val();
            if (!data) return;

            document.getElementById('wait-area').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('q-header').innerText = `第${index + 1}問`;

            // 📸 画像の表示切り替え
            const imgWrap = document.getElementById('img-wrap');
            const imgEl = document.getElementById('display-img');
            if (data.image) {
                imgEl.src = data.image;
                imgWrap.style.display = 'flex';
            } else {
                imgWrap.style.display = 'none';
            }

            // 📝 テキストの表示
            document.getElementById('display-text').innerText = data.text || "";

            // ボタンを有効化
            document.querySelectorAll('.opt-btn').forEach(b => b.disabled = false);
        });
    }

    // 回答を送信
    function sendAnswer(choice) {
        // 二重回答防止
        document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
        
        db.ref('answers/' + myUid).set({
            choice: choice,
            ts: Date.now()
        });
        
        alert(choice + " を送信しました！");
    }
</script>

</body>
</html>
