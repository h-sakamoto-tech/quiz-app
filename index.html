<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ管理画面 (index)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #1a1a1a; color: #fff; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid #f1c40f; padding-bottom: 15px; }
        .section { background: #2d2d2d; padding: 20px; border-radius: 10px; border: 1px solid #444; margin-bottom: 20px; }
        
        /* GitHub設定エリア */
        .config-area { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #3498db; }
        .config-area input { background: #000; color: #2ecc71; border: 1px solid #333; padding: 8px; border-radius: 4px; font-size: 12px; }

        .q-row { background: #3d3d3d; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #f1c40f; }
        .q-grid { display: flex; gap: 15px; }
        .preview-box { width: 140px; height: 100px; background: #000; border: 1px solid #555; display: flex; align-items: center; justify-content: center; position: relative; border-radius: 4px; overflow: hidden; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .up-status { position: absolute; background: rgba(0,0,0,0.8); width: 100%; height: 100%; display: none; align-items: center; justify-content: center; color: #f1c40f; font-size: 12px; }

        .btn-upload { background: #3498db; color: #fff; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; display: inline-block; margin-bottom: 8px; }
        .q-img-url { width: 100%; padding: 8px; background: #111; color: #888; border: 1px solid #444; font-size: 11px; margin-bottom: 5px; }
        textarea { width: 100%; height: 50px; background: #111; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; resize: none; }
        
        .btn-save { background: #27ae60; color: white; width: 100%; padding: 15px; font-size: 20px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
        .btn-control { width: 100%; padding: 15px; font-size: 20px; color: white; border-radius: 8px; border: none; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>スピードクイズ 管理センター (GitHub連携)</h1>
</div>

<div class="section">
    <h3>🔑 GitHub連携設定</h3>
    <div class="config-area">
        <input type="password" id="gh-token" placeholder="GitHubトークン (ghp_...)">
        <input type="text" id="gh-user" placeholder="ユーザー名">
        <input type="text" id="gh-repo" placeholder="リポジトリ名">
    </div>
</div>

<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
    <div class="section">
        <h2>📝 問題リスト</h2>
        <div id="questions-container"></div>
        <button onclick="addQuestionRow()" style="width:100%; background:#444; color:#fff; padding:10px; border:none; cursor:pointer;">＋ 問題を追加</button>
        <button class="btn-save" style="margin-top:20px;" onclick="saveAll()">💾 全設定を保存して反映</button>
    </div>

    <div class="section">
        <h2>🎮 進行管理</h2>
        <div id="status-text" style="font-size:24px; color:#f1c40f; font-weight:bold; text-align:center; margin-bottom:15px;">待機中</div>
        <button class="btn-control" style="background:#8e44ad;" onclick="startFlow()">🚀 クイズ開始</button>
        <div id="nav" style="display:none; gap:10px;">
            <button class="btn-control" style="background:#555; flex:1;" onclick="prev()">戻る</button>
            <button class="btn-control" style="background:#e74c3c; flex:2;" onclick="next()">次へ</button>
        </div>
    </div>
</div>

<script>
    // Firebase初期設定（プロジェクトに合わせて書き換えてください）
    var firebaseConfig = { 
        apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", 
        authDomain: "speed-quiz26.firebaseapp.com", 
        databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "speed-quiz26" 
    };
    firebase.initializeApp(firebaseConfig); var db = firebase.database();
    let scenario = []; let currentIdx = -1;

    function addQuestionRow(data = null) {
        const div = document.createElement('div'); div.className = 'q-row';
        const img = data ? (data.image || '') : '';
        const txt = data ? (data.text || '') : '';
        const ans = data ? data.ans : 'A';
        div.innerHTML = `
            <div class="q-grid">
                <div class="preview-box">
                    <div class="up-status">UP中...</div>
                    <img src="${img}" style="${img ? 'display:block' : 'display:none'}">
                </div>
                <div style="flex:1;">
                    <label class="btn-upload"><i class="fa fa-folder-open"></i> 画像を選択<input type="file" style="display:none" onchange="uploadToGitHub(this)"></label>
                    <input type="text" class="q-img-url" value="${img}" readonly placeholder="URLは自動入力されます">
                    <textarea class="q-txt" placeholder="画像の下に表示する補足テキスト">${txt}</textarea>
                    正解: <select class="q-ans">${['A','B','C','D','E','F','G'].map(v=>`<option value="${v}" ${ans===v?'selected':''}>${v}</option>`).join('')}</select>
                </div>
            </div>
            <button onclick="this.parentElement.remove()" style="color:#666; background:none; border:none; cursor:pointer; font-size:12px;">[削除]</button>
        `;
        document.getElementById('questions-container').appendChild(div);
    }

    async function uploadToGitHub(input) {
        const file = input.files[0]; if (!file) return;
        const token = document.getElementById('gh-token').value;
        const user = document.getElementById('gh-user').value;
        const repo = document.getElementById('gh-repo').value;
        if (!token || !user || !repo) return alert("GitHub設定を最初に入力してください");

        const row = input.closest('.q-row');
        row.querySelector('.up-status').style.display = 'flex';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const base64Content = reader.result.split(',')[1];
            const fileName = `q_${Date.now()}_${file.name}`;
            const path = `images/${fileName}`;

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "upload quiz image", content: base64Content })
                });
                const rawUrl = `https://raw.githubusercontent.com/${user}/${repo}/main/${path}`;
                row.querySelector('.q-img-url').value = rawUrl;
                row.querySelector('img').src = rawUrl;
                row.querySelector('img').style.display = 'block';
            } catch (e) { alert("アップロード失敗"); }
            row.querySelector('.up-status').style.display = 'none';
        };
    }

    function saveAll() {
        const qList = []; document.querySelectorAll('.q-row').forEach(r => { 
            qList.push({ image: r.querySelector('.q-img-url').value, text: r.querySelector('.q-txt').value, ans: r.querySelector('.q-ans').value }); 
        });
        db.ref('quizConfig').set(qList).then(() => { alert("保存しました"); location.reload(); });
    }

    window.onload = () => { db.ref('quizConfig').once('value', s => { if(s.val()) s.val().forEach(d => addQuestionRow(d)); else addQuestionRow(); }); };
    
    function build(n) {
        scenario = [{type:'rules',t:'ルール説明'}];
        for(let i=0;i<n;i++) { scenario.push({type:i===0?'start':'next',qi:i,t:`第${i+1}問 受付中`},{type:'close',qi:i,t:`第${i+1}問 正解発表`}); }
        scenario.push({type:'end',t:'全問終了'},{type:'details',t:'結果発表'},{type:'ranking',t:'総合順位'});
    }

    function startFlow() { db.ref('quizConfig').once('value', s => { if(s.val()){ build(s.val().length); currentIdx = 0; exec(); } }); }
    function next() { if(currentIdx < scenario.length-1) { currentIdx++; exec(); } }
    function prev() { if(currentIdx > 0) { currentIdx--; exec(); } }
    function exec() {
        const s = scenario[currentIdx]; document.getElementById('status-text').innerText = s.t;
        document.getElementById('nav').style.display = 'flex';
        db.ref('adminCommand').set({ type: s.type, qIndex: s.qi !== undefined ? s.qi : -1, ts: Date.now() });
    }
</script>
</body>
</html>
