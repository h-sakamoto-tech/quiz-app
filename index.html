<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ管理画面 (画像アップロード対応)</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: #1e1e1e; color: #fff; padding: 20px; margin: 0; }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid #f1c40f; padding-bottom: 20px; }
        .header h1 { color: #f1c40f; margin: 0; font-size: 2.5rem; }
        
        .section { background: #2d2d2d; padding: 25px; border-radius: 12px; border: 1px solid #444; margin-bottom: 20px; }
        .q-row { background: #3d3d3d; padding: 20px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid #3498db; }
        
        .q-input-group { display: flex; gap: 15px; margin-bottom: 10px; align-items: flex-start; }
        .q-preview-box { width: 150px; height: 110px; background: #111; border: 1px solid #555; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 4px; flex-shrink: 0; position: relative; }
        .q-preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        /* 📸 アップロードボタンのデザイン */
        .upload-btn-wrapper { margin-top: 10px; }
        .file-input { display: none; }
        .custom-file-upload { background: #3498db; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; display: inline-block; transition: 0.3s; }
        .custom-file-upload:hover { background: #2980b9; }
        .loading-spinner { position: absolute; font-size: 12px; color: #f1c40f; display: none; }

        .url-field { flex: 1; }
        .q-img-url { width: 100%; padding: 8px; background: #111; color: #2ecc71; border: 1px solid #555; border-radius: 4px; font-size: 12px; margin-bottom: 5px; }
        textarea.q-txt { width: 100%; height: 60px; background: #111; color: #fff; border: 1px solid #555; padding: 8px; font-size: 14px; box-sizing: border-box; }

        .btn-save { background: #27ae60; color: white; width: 100%; padding: 20px; font-size: 24px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }
        .btn-add { background: #34495e; color: white; width: 100%; padding: 15px; border: 2px dashed #7f8c8d; cursor: pointer; margin-top: 10px; font-size: 18px; border-radius: 8px; }
        .btn-control { width: 100%; padding: 20px; font-size: 28px; color: white; border-radius: 10px; cursor: pointer; border: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h1>スピードクイズ管理画面 (フォルダからアップロード版)</h1>
</div>

<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 30px;">
    <div>
        <div class="section">
            <h2 style="margin-top:0;">📝 クイズ問題の設定</h2>
            <div id="questions-container"></div>
            <button type="button" class="btn-add" onclick="addQuestionRow()">＋ 問題を追加</button>
            <button type="button" class="btn-save" onclick="saveAllConfig()">💾 全ての設定を保存して反映</button>
        </div>
    </div>

    <div>
        <div class="section" style="position: sticky; top: 20px;">
            <h2>🎮 進行管理</h2>
            <div style="background: #111; padding: 15px; border: 1px solid #f1c40f; text-align: center; margin-bottom: 15px; border-radius: 8px;">
                <div id="current-status-text" style="font-size:20px; color:#f1c40f; font-weight:bold;">待機中</div>
            </div>
            <button class="btn-control" style="background:#8e44ad;" onclick="startQuizFlow()">🚀 クイズ開始</button>
            <div id="nav-group" style="display:none; gap:10px;">
                <button class="btn-control" style="background:#555; flex:1;" onclick="goPrev()">戻る</button>
                <button class="btn-control" style="background:#e74c3c; flex:2;" id="btn-next-step" onclick="goNext()">次へ進む</button>
            </div>
            <button onclick="resetGame()" style="margin-top:30px; background:none; border:1px solid #555; color:#777; width:100%; cursor:pointer;">全リセット</button>
        </div>
    </div>
</div>

<script>
    // Firebase初期設定
    var firebaseConfig = { 
        apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", 
        authDomain: "speed-quiz26.firebaseapp.com", 
        databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "speed-quiz26",
        storageBucket: "speed-quiz26.appspot.com" // ★Storageのバケット名を追加
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();
    var storage = firebase.storage();

    let scenario = []; let currentStepIndex = -1;

    // 📸 問題行を追加
    function addQuestionRow(qData = null) {
        const container = document.getElementById('questions-container');
        const qIndex = document.querySelectorAll('.q-row').length;
        const div = document.createElement('div'); div.className = 'q-row';
        
        const imgVal = qData ? (qData.image || '') : '';
        const txtVal = qData ? (qData.text || '') : '';
        const ansVal = qData ? qData.ans : 'A';

        div.innerHTML = `
            <div class="q-input-group">
                <div class="q-preview-box">
                    <img src="${imgVal}" class="prev-img" style="${imgVal ? 'display:block' : 'display:none'}">
                    <div class="loading-spinner">UP中...</div>
                    <span class="no-img-label" style="${imgVal ? 'display:none' : 'display:block'}">No Image</span>
                </div>
                <div class="url-field">
                    <div class="upload-btn-wrapper">
                        <label class="custom-file-upload">
                            <input type="file" class="file-input" accept="image/*" onchange="handleFileUpload(this)">
                            <i class="fa fa-cloud-upload"></i> パソコンから画像を選択
                        </label>
                    </div>
                    <input type="text" class="q-img-url" placeholder="画像のURL（自動入力されます）" value="${imgVal}" readonly>
                    <textarea class="q-txt" placeholder="画像の下に表示する補足テキスト">${txtVal}</textarea>
                </div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                <span>正解: <select class="q-ans">${['A','B','C','D','E','F','G'].map(v=>`<option value="${v}" ${ansVal===v?'selected':''}>${v}</option>`).join('')}</select></span>
                <button onclick="this.parentElement.parentElement.remove()" style="color:#e74c3c; background:none; border:none; cursor:pointer;">削除</button>
            </div>
        `;
        container.appendChild(div);
    }

    // ☁️ Firebase Storageへアップロードする関数
    async function handleFileUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const row = input.closest('.q-row');
        const imgPreview = row.querySelector('.prev-img');
        const urlInput = row.querySelector('.q-img-url');
        const spinner = row.querySelector('.loading-spinner');
        const label = row.querySelector('.no-img-label');

        // 表示を「アップロード中」にする
        spinner.style.display = 'block';
        label.style.display = 'none';

        try {
            // ファイル名をユニークにするためにタイムスタンプを付与
            const fileName = Date.now() + "_" + file.name;
            const storageRef = storage.ref('quiz_images/' + fileName);
            
            // アップロード実行
            const snapshot = await storageRef.put(file);
            // 完了したらダウンロードURLを取得
            const downloadURL = await snapshot.ref.getDownloadURL();

            // 画面に反映
            urlInput.value = downloadURL;
            imgPreview.src = downloadURL;
            imgPreview.style.display = 'block';
            spinner.style.display = 'none';

        } catch (error) {
            console.error("アップロード失敗:", error);
            alert("アップロードに失敗しました。Storageのルール設定を確認してください。");
            spinner.style.display = 'none';
            label.style.display = 'block';
        }
    }

    function saveAllConfig() {
        const qData = []; 
        document.querySelectorAll('.q-row').forEach(r => { 
            qData.push({ 
                image: r.querySelector('.q-img-url').value, 
                text: r.querySelector('.q-txt').value, 
                ans: r.querySelector('.q-ans').value 
            }); 
        });
        db.ref('quizConfig').set(qData).then(() => { alert("保存完了！"); location.reload(); });
    }

    // 進行管理の基本ロジック
    window.onload = function() {
        db.ref('quizConfig').once('value', snap => {
            const data = snap.val();
            if (data && data.length > 0) { data.forEach(q => addQuestionRow(q)); buildScenario(data.length); } 
            else { addQuestionRow(); }
        });
    };

    function buildScenario(n) {
        scenario = [{type:'rules',title:'ルール説明'}];
        for(let i=0;i<n;i++) { 
            scenario.push({type:i===0?'start':'next',qIndex:i,title:`第${i+1}問 受付中`}); 
            scenario.push({type:'close',qIndex:i,title:`第${i+1}問 正解発表`}); 
        }
        scenario.push({type:'end',title:'全問終了'},{type:'details',title:'結果発表'},{type:'ranking',title:'総合順位'});
    }

    function startQuizFlow() { currentStepIndex = 0; executeStep(); }
    function goNext() { if (currentStepIndex < scenario.length - 1) { currentStepIndex++; executeStep(); } }
    function goPrev() { if (currentStepIndex > 0) { currentStepIndex--; executeStep(); } }
    function executeStep() {
        const step = scenario[currentStepIndex];
        document.getElementById('current-status-text').innerText = step.title;
        document.getElementById('nav-group').style.display = 'flex';
        db.ref('adminCommand').set({ type: step.type, qIndex: step.qIndex !== undefined ? step.qIndex : -1, ts: Date.now() });
    }
    function resetGame() { if(confirm("リセット？")) { db.ref('players').remove(); db.ref('answers').remove(); location.reload(); } }
</script>
</body>
</html>
