<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ 運営パネル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #2c3e50; color: #fff; padding: 15px 30px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 24px; }
        
        /* 修正ポイント：マニュアルボタンのデザイン */
        .btn-manual { background: #f1c40f; color: #2c3e50; text-decoration: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; transition: 0.3s; }
        .btn-manual:hover { background: #f39c12; }

        .container { display: flex; gap: 20px; }
        .panel { background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); flex: 1; }
        h2 { font-size: 18px; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-top: 0; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input[type="text"], input[type="file"], select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 10px; transition: 0.2s; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-success { background: #2ecc71; color: #fff; margin-top: 20px; }
        .btn-success:hover { background: #27ae60; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-outline { background: transparent; border: 2px solid #e74c3c; color: #e74c3c; margin-top: 30px; }
        
        .q-box { background: #f9f9f9; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; border-radius: 5px; position: relative; }
        .q-box h3 { margin-top: 0; color: #555; font-size: 16px; }
        
        .status-area { background: #e8f4f8; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .status-val { font-size: 30px; font-weight: bold; color: #2c3e50; }
        
        .player-list { max-height: 200px; overflow-y: auto; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
        .player-item { padding: 5px; border-bottom: 1px dashed #eee; font-size: 14px; }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-cogs"></i> スピードクイズ 運営パネル</h1>
        <a href="./manual.html" target="_blank" class="btn-manual"><i class="fas fa-book"></i> 運営マニュアルを開く</a>
    </div>

    <div class="container">
        <div class="panel" style="flex: 1.2;">
            <h2><i class="fas fa-music"></i> 音源設定 (任意)</h2>
            <div id="audio-setup">
                <div class="form-group"><label>1. 締切＆ルール説明用</label><input type="file" id="au-rules" accept="audio/*"></div>
                <div class="form-group"><label>2. クイズ開始用 (デデン!等)</label><input type="file" id="au-start" accept="audio/*"></div>
                <div class="form-group"><label>3. 次へ (正解音等)</label><input type="file" id="au-next" accept="audio/*"></div>
                <div class="form-group"><label>4. 終了表示用</label><input type="file" id="au-end" accept="audio/*"></div>
                <div class="form-group"><label>5. 結果発表 (一覧)</label><input type="file" id="au-details" accept="audio/*"></div>
                <div class="form-group"><label>6. 総合発表 (トップ3)</label><input type="file" id="au-ranking" accept="audio/*"></div>
            </div>

            <h2 style="margin-top: 30px;"><i class="fas fa-edit"></i> クイズ内容の設定</h2>
            <div id="q-container"></div>
            <button class="btn btn-primary" onclick="addQuestionBox()"><i class="fas fa-plus"></i> 問題を追加する</button>
            <button class="btn btn-success" onclick="saveQuizConfig()"><i class="fas fa-save"></i> 設定を保存して反映（※必須）</button>
        </div>

        <div class="panel">
            <h2><i class="fas fa-gamepad"></i> 進行コントロール</h2>
            
            <div class="status-area">
                <div style="font-size: 14px; color: #666;">現在の参加者数</div>
                <div class="status-val"><span id="player-count">0</span> 名</div>
            </div>

            <button class="btn btn-primary" onclick="sendCommand('rules')">① 受付締切 (ルール説明へ)</button>
            <button class="btn btn-warning" onclick="sendCommand('next')" style="margin-top:20px;">② 次へ (問題を開始)</button>
            <button class="btn btn-danger" onclick="sendCommand('close')">③ 手動で締め切る</button>
            
            <hr style="border:0; border-top:1px solid #ddd; margin: 30px 0;">
            
            <button class="btn btn-primary" onclick="sendCommand('end')" style="background:#8e44ad;">④ 全問終了へ (終了表示)</button>
            <button class="btn btn-primary" onclick="sendCommand('details')" style="background:#2c3e50; margin-top:10px;">⑤ 結果発表 (一覧) へ</button>
            <button class="btn btn-primary" onclick="sendCommand('ranking')" style="background:#d35400; margin-top:10px;">⑥ 総合発表 (トップ3) へ</button>

            <h2 style="margin-top: 40px;"><i class="fas fa-users"></i> 参加者リスト</h2>
            <div class="player-list" id="p-list"></div>

            <button class="btn btn-outline" onclick="resetPlayers()"><i class="fas fa-trash-alt"></i> 参加者データのみリセット</button>
        </div>
    </div>

    <script>
        // Firebase設定
        var firebaseConfig = {
            apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0",
            authDomain: "speed-quiz26.firebaseapp.com",
            databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "speed-quiz26"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let qCount = 0;
        let audioElements = {};

        // 音声ファイルのセットアップ
        const audioIds = ['rules', 'start', 'next', 'end', 'details', 'ranking'];
        audioIds.forEach(id => {
            document.getElementById('au-' + id).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    audioElements[id] = new Audio(url);
                }
            });
        });

        function playAudio(id) {
            if (audioElements[id]) {
                audioElements[id].currentTime = 0;
                audioElements[id].play().catch(e => console.log("音声再生エラー:", e));
            }
        }

        // 問題入力枠の追加
        function addQuestionBox() {
            qCount++;
            const div = document.createElement('div');
            div.className = 'q-box';
            div.id = 'qbox-' + qCount;
            div.innerHTML = `
                <h3>第 ${qCount} 問</h3>
                <div class="form-group"><label>問題文</label><input type="text" id="qtext-${qCount}" placeholder="問題を入力"></div>
                <div class="form-group"><label>画像URL (任意)</label><input type="text" id="qimg-${qCount}" placeholder="https://..."></div>
                <div class="form-group"><label>正解の選択肢</label>
                    <select id="qans-${qCount}">
                        <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                        <option value="D">D</option><option value="E">E</option><option value="F">F</option><option value="G">G</option>
                    </select>
                </div>
            `;
            document.getElementById('q-container').appendChild(div);
        }

        // ページ読み込み時に1問目だけ出しておく
        window.onload = () => addQuestionBox();

        // クイズ設定をFirebaseに保存
        function saveQuizConfig() {
            let quizData = [];
            for (let i = 1; i <= qCount; i++) {
                const text = document.getElementById('qtext-' + i).value;
                if (!text) continue; // 空欄は無視
                quizData.push({
                    text: text,
                    img: document.getElementById('qimg-' + i).value,
                    ans: document.getElementById('qans-' + i).value
                });
            }
            if(quizData.length === 0) { alert("問題を1つ以上入力してください！"); return; }
            db.ref('quizConfig').set(quizData).then(() => {
                alert("問題の設定を保存しました！準備完了です。");
            });
        }

        // 進行コマンドをFirebaseに送信
        function sendCommand(type) {
            db.ref('adminCommand').set({ type: type, ts: Date.now() });
            
            // コマンドに合わせて音を鳴らす
            if(type === 'rules') playAudio('rules');
            if(type === 'next') playAudio('next'); // 実際は「スタート」や「次へ」の判定をここで細かくしてもOK
            if(type === 'end') playAudio('end');
            if(type === 'details') playAudio('details');
            if(type === 'ranking') playAudio('ranking');
        }

        // 参加者リストのリアルタイム監視
        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            const listDiv = document.getElementById('p-list');
            listDiv.innerHTML = '';
            let count = 0;
            for (let id in players) {
                count++;
                listDiv.innerHTML += `<div class="player-item">👤 ${players[id].name}</div>`;
            }
            document.getElementById('player-count').innerText = count;
        });

        // 参加者データのリセット
        function resetPlayers() {
            if(confirm("参加者の名前や点数のデータをすべて消去して、最初からやり直しますか？\n（※登録した問題や音源は消えません）")) {
                db.ref('players').remove();
                db.ref('answers').remove();
                db.ref('adminCommand').set({ type: 'reset', ts: Date.now() });
                alert("参加者データをリセットしました！");
            }
        }
    </script>
</body>
</html>
