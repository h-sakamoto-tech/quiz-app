<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>運営パネル - 最終版</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #fff; padding: 20px; margin: 0; }
        .section { background: #2d2d2d; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #444; }
        .q-row { background: #3d3d3d; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #3498db; }
        textarea { width: 100%; height: 80px; background: #111; color: #fff; border: 1px solid #555; padding: 10px; font-size: 16px; }
        .btn-save { background: #27ae60; color: white; width: 100%; padding: 15px; font-size: 20px; font-weight: bold; border: none; cursor: pointer; margin-top: 10px; border-radius: 5px; }
        .btn-control { width: 100%; padding: 15px; font-size: 24px; color: white; border-radius: 8px; cursor: pointer; border: none; margin-bottom: 10px; }
        .player-badge { background: #2980b9; padding: 5px 10px; border-radius: 5px; font-size: 12px; margin: 2px; display: inline-block; }
    </style>
</head>
<body>
<div style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px;">
    <div>
        <div class="section">
            <h2>🔊 音源設定</h2>
            <input type="text" id="base-url" style="width:100%; padding:10px; background:#111; color:#2ecc71; border:1px solid #555;" placeholder="GitHubフォルダURL (例: https://.../sounds/)" onchange="autoFill()">
            <div id="url-list" style="font-size:12px; color:#aaa; margin-top:10px;"></div>
        </div>
        <div class="section">
            <h2>📝 クイズ設定</h2>
            <div id="questions-container"></div>
            <button onclick="addQuestionRow()" style="width:100%; padding:10px; cursor:pointer;">＋ 問題を追加</button>
            <button class="btn-save" onclick="saveAll()">💾 全設定を保存（クラウド直結）</button>
        </div>
    </div>
    <div>
        <div class="section">
            <h2>🎮 進行</h2>
            <div id="status" style="font-size:24px; color:#f1c40f; text-align:center; padding:10px;">待機中</div>
            <button class="btn-control" style="background:#8e44ad;" id="btn-rules" onclick="doStep('rules')">受付締切</button>
            <div id="nav" style="display:none; gap:5px;">
                <button class="btn-control" style="background:#555; flex:1;" onclick="goPrev()">戻る</button>
                <button class="btn-control" style="background:#e74c3c; flex:2;" onclick="goNext()">次へ</button>
            </div>
            <div style="margin-top:20px;">参加: <span id="p-count">0</span></div>
            <div id="p-list"></div>
            <button onclick="resetAll()" style="margin-top:20px; width:100%; background:none; border:1px solid #555; color:#555;">全リセット</button>
        </div>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", authDomain: "speed-quiz26.firebaseapp.com", databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "speed-quiz26" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let scenario = []; let currentIdx = -1; let sndUrls = {};

    window.onload = () => {
        db.ref('soundConfig').once('value', s => { sndUrls = s.val() || {}; if(sndUrls.base) document.getElementById('base-url').value = sndUrls.base; updateUrlList(); });
        db.ref('quizConfig').once('value', s => { const d = s.val(); if(d) { d.forEach(q => addQuestionRow(q)); buildScenario(d.length); } else { addQuestionRow(); } });
    };

    function autoFill() {
        const b = document.getElementById('base-url').value; if(!b) return;
        const f = b.endsWith('/') ? b : b + '/';
        sndUrls = { base: f, rules: f+"rules.mp3", start: f+"start.mp3", next: f+"next.mp3", end: f+"end.mp3", details: f+"details.mp3", ranking: f+"ranking.mp3" };
        updateUrlList();
    }
    function updateUrlList() { document.getElementById('url-list').innerText = "設定中: " + (sndUrls.rules || "なし"); }

    window.addQuestionRow = function(d=null) {
        const c = document.getElementById('questions-container');
        const div = document.createElement('div'); div.className = 'q-row';
        div.innerHTML = `<textarea class="q-txt">${d?d.text:''}</textarea>正解:<select class="q-ans">${['A','B','C','D','E','F','G'].map(v=>`<option value="${v}" ${d&&d.ans===v?'selected':''}>${v}</option>`).join('')}</select><button onclick="this.parentElement.remove()">削除</button>`;
        c.appendChild(div);
    };

    function saveAll() {
        const qData = []; document.querySelectorAll('.q-row').forEach(r => { qData.push({ text: r.querySelector('.q-txt').value, ans: r.querySelector('.q-ans').value }); });
        db.ref('quizConfig').set(qData); db.ref('soundConfig').set(sndUrls); alert("保存しました！"); location.reload();
    }

    function buildScenario(n) {
        scenario = [{type:'rules',t:'ルール'}];
        for(let i=0;i<n;i++) { scenario.push({type:i===0?'start':'next',q:i,t:`第${i+1}問`}, {type:'close',q:i,t:`第${i+1}問 終了`}); }
        scenario.push({type:'end',t:'終了'},{type:'details',t:'結果'},{type:'ranking',t:'順位'});
    }
    function doStep(type, q=null) {
        document.getElementById('status').innerText = scenario[currentIdx]?.t || "進行中";
        document.getElementById('btn-rules').style.display = 'none'; document.getElementById('nav').style.display = 'flex';
        db.ref('adminCommand').set({ type: type, qIndex: q, ts: Date.now() });
    }
    function goNext() { if(currentIdx < scenario.length-1) { currentIdx++; const s = scenario[currentIdx]; doStep(s.type, s.q); } }
    function goPrev() { if(currentIdx > 0) { currentIdx--; const s = scenario[currentIdx]; doStep(s.type, s.q); } }
    function resetAll() { if(confirm("消去？")) { db.ref().remove(); location.reload(); } }

    db.ref('players').on('value', s => {
        const p = s.val() || {}; document.getElementById('p-count').innerText = Object.keys(p).length;
        document.getElementById('p-list').innerHTML = Object.values(p).map(v => `<span class="player-badge">${v.name}</span>`).join('');
    });
</script>
</body>
</html>
