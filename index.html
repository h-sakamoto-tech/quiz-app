<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ管理画面 - FINAL RANKING</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', system-font, sans-serif; background-color: #121212; color: #AAA; margin: 0; padding: 2rem; }
        header { text-align: center; margin-bottom: 2rem; }
        h1 { color: #F8D34F; font-size: 3rem; text-shadow: 0 0 15px #F8D34F; margin: 0; }
        main { width: 100%; max-width: 1400px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 1rem; }
        thead th { color: #F8D34F; font-size: 1.3rem; font-weight: bold; text-align: center; padding: 1rem; border-bottom: 2px solid #333; }
        tbody tr { background-color: #1a1a1a; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }
        tbody td { padding: 1rem; text-align: center; vertical-align: middle; font-size: 1.1rem; border: none; }
        .col-rank { width: 6%; font-size: 2.5rem; color: #F8D34F; font-weight: bold; }
        .col-team { width: 25%; text-align: left; }
        .col-total { width: 15%; font-size: 2.5rem; color: #F8D34F; font-weight: bold; }
        .col-total sub { font-size: 1rem; color: #AAA; font-weight: normal; margin-left: 5px; }
        .col-q { width: 6.75%; min-width: 120px; }
        .col-team-content { display: flex; align-items: center; gap: 15px; }
        .avatar { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #F8D34F; display: flex; align-items: center; justify-content: center; background-color: #333; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .col-name { font-weight: bold; font-size: 1.2rem; }
        .correct { color: #4CAF50; font-size: 2rem; font-weight: bold; }
        .incorrect { color: #F44336; font-size: 2rem; font-weight: bold; }
        .result-time { color: #AAA; font-size: 1rem; }
        hr { border: none; border-top: 1px solid #333; margin: 1rem 0; }
    </style>
</head>
<body>
    <header>
        <h1>FINAL RANKING</h1>
    </header>
    <main>
        <div id="questions-container"></div>
    </main>
<script>
    // Firebaseの設定と初期化（適宜書き換えてください）
    var firebaseConfig = { apiKey: "YOUR_API_KEY", authDomain: "YOUR_AUTH_DOMAIN", databaseURL: "YOUR_DATABASE_URL", projectId: "YOUR_PROJECT_ID" };
    firebase.initializeApp(firebaseConfig); var db = firebase.database();
    
    // 設問データを取得して表示
    db.ref('quizConfig').on('value', snap => {
        const data = snap.val();
        if (data) {
            let html = '<table id="ranking-table"><thead><tr>';
            html += '<th class="col-rank">RANK</th>';
            html += '<th class="col-team">TEAM</th>';
            html += '<th class="col-total">TOTAL</th>';
            for (let i = 0; i < data.length; i++) { html += `<th class="col-q">Q${i+1}</th>`; }
            html += '</tr></thead><tbody>';

            // データの並び替えや処理を行う（ここではダミーデータ）
            // ...

            html += `<tr>
                <td class="col-rank">1</td>
                <td class="col-team">
                    <div class="col-team-content">
                        <div class="avatar"><img src="YOUR_AVATAR_URL" alt="アバター" onerror="this.onerror=null;"></div>
                        <div class="col-name">坂本晴彦</div>
                    </div>
                </td>
                <td class="col-total">637 <sub>pt</sub></td>
                <td class="col-q">
                    <div><span class="correct">〇</span><br><span class="result-time">1秒</span></div>
                </td>
                <td class="col-q">
                    <div><span class="incorrect">✖</span><br><span class="result-time">1秒</span></div>
                </td>
                <td class="col-q">
                    <div><span class="incorrect">✖</span><br><span class="result-time">20秒</span></div>
                </td>
                <td class="col-q">
                    <div><span class="incorrect">✖</span><br><span class="result-time">1秒</span></div>
                </td>
                <td class="col-q">
                    <div><span class="incorrect">✖</span><br><span class="result-time">1秒</span></div>
                </td>
                <td class="col-q">
                    <div><span class="correct">〇</span><br><span class="result-time">1秒</span></div>
                </td>
                <td class="col-q">
                    <div><span class="correct">〇</span><br><span class="result-time">0秒</span></div>
                </td>
                <td class="col-q">
                    <div><span class="correct">〇</span><br><span class="result-time">1秒</span></div>
                </td>
            </tr>`;
            html += '</tbody></table>';
            document.getElementById('questions-container').innerHTML = html;
        }
    });
</script>
</body>
</html>
