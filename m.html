<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>クイズハルメク10・メインスクリーン</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', Meiryo, sans-serif; overflow: hidden; text-align: center; }
        #display-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }

        /* 待機用QRコードエリア */
        .qr-area { display: flex; flex-direction: column; align-items: center; margin-top: 30px; }
        .qr-area img { border: 15px solid #fff; border-radius: 10px; width: 300px; height: 300px; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .qr-text { font-size: 2.5rem; color: #2ecc71; margin-top: 20px; font-weight: bold; letter-spacing: 2px; }

        /* 問題表示エリア */
        .q-image-frame { height: 60vh; width: 96vw; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; }
        .q-image { height: 60vh; width: auto; max-width: 96vw; border: 8px solid #2ecc71; border-radius: 20px; box-shadow: 0 0 60px rgba(46, 204, 113, 0.4); object-fit: contain; background-color: #000; }
        .q-text { font-size: 4rem; font-weight: bold; color: #ffffff; text-shadow: 0 0 20px rgba(0,0,0,1), 2px 2px 0px #2ecc71; line-height: 1.2; white-space: pre-wrap; max-width: 95vw; }
        
        .q-header { 
            font-size: 3rem; 
            font-weight: bold; 
            color: #2ecc71; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            letter-spacing: 10px; 
            border-bottom: 3px solid #2ecc71; 
            padding-bottom: 10px; 
        }

        .big-msg { font-size: 10rem; font-weight: bold; color: #f1c40f; text-shadow: 0 0 30px #f1c40f; }
        .timeup-msg { font-size: 12rem; color: #e74c3c; font-weight: bold; animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.05); opacity: 0.7; } }

        /* ルール説明用スタイル */
        .rule-wrapper { background: rgba(11, 14, 20, 0.9); padding: 50px 60px; border-radius: 20px; border: 3px solid #3498db; box-shadow: 0 0 40px rgba(52, 152, 219, 0.5); text-align: center; max-width: 90vw; }
        .rule-title-text { font-size: 6rem; color: #f1c40f; text-align: center; margin-bottom: 20px; text-shadow: 0 0 20px rgba(241, 196, 15, 0.8); letter-spacing: 5px; font-weight: bold; }
        .rule-intro { font-size: 3.2rem; color: #fff; text-align: center; margin-bottom: 50px; line-height: 1.6; }
        .rule-item { font-size: 3.2rem; color: #ecf0f1; margin-bottom: 30px; line-height: 1.5; }
        .rule-highlight { color: #e74c3c; font-weight: bold; text-shadow: 2px 2px 0px #000; background: rgba(231, 76, 60, 0.2); padding: 0 10px; border-radius: 10px; }
        .rule-item.alert { color: #f1c40f; font-weight: bold; margin-top: 50px; border-top: 2px dashed #f1c40f; padding-top: 40px; }

        /* ランキング・マトリクス表 */
        .ranking-container { width: 98%; }
        .ranking-table { width: 100%; border-collapse: separate; border-spacing: 0 18px; font-size: 2.2rem; table-layout: fixed; }
        .ranking-table tr { background: rgba(255,255,255,0.05); border-radius: 12px; }
        .ranking-table th { color: #f1c40f; font-size: 1.9rem; padding: 15px 10px; border-bottom: 2px solid #f1c40f; letter-spacing: 2px; }
        .ranking-table td { padding: 15px; vertical-align: middle; }
        
        .col-rank { width: 8%; font-size: 3.8rem; font-weight: bold; color: #3498db; text-align: center; }
        .col-team { width: 25%; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-left: 30px; }
        .col-total { width: 16%; text-align: center; }
        
        .bonus-points { font-size: 1.3rem; display: block; line-height: 1; font-weight: normal;}
        .correct-bonus { color: #2ecc71; }
        .time-bonus { color: #3498db; }

        .top-1 { background: rgba(241, 196, 15, 0.15) !important; border: 2px solid #f1c40f; }
        .top-1 .rank-number { color: #f1c40f; }
        .team-avatar { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; vertical-align: middle; margin-right: 20px; }

        /* 回答発表専用のコンパクトスタイル */
        .answer-view-compact .q-header {
            font-size: 2.5rem;
            margin-bottom: 15px;
            padding-bottom: 5px;
            letter-spacing: 5px;
        }
        .answer-view-compact .q-image-frame {
            height: 50vh; 
            margin-bottom: 10px;
        }
        .answer-view-compact .q-image {
            height: 50vh; 
        }
    </style>
</head>
<body>

<div id="display-container">
    <div id="view-area"></div>
</div>

<script>
    firebase.initializeApp({ apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", authDomain: "speed-quiz26.firebaseapp.com", databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "speed-quiz26" });
    const db = firebase.database();
    const view = document.getElementById('view-area');

    const standbyHTML = `
        <div class="big-msg">クイズハルメク10</div>
        <div class="qr-area">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://h-sakamoto-tech.github.io/quiz-app/h.html" alt="参加QRコード">
            <div class="qr-text">スマホでQRコードを読み取ってエントリー！</div>
            <div style="font-size: 1.8rem; color: #e74c3c; margin-top: 15px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 10px; letter-spacing: 1px;">※QRコードはチームリーダー以外は読み込まないでください</div>
        </div>
    `;

    db.ref('adminCommand').on('value', snap => {
        const cmd = snap.val();
        
        if (!cmd || cmd.type === 'standby' || cmd.type === 'reset') {
            view.innerHTML = standbyHTML;
            return;
        }

        if (cmd.type === 'rules') {
            view.innerHTML = `
                <div class="rule-wrapper">
                    <div class="rule-title-text">RULES</div>
                    <div class="rule-intro">それではスピードクイズの時間がやってまいりました！<br>全部で５問出題します。</div>
                    <div class="rule-item">
                        スマホ画面の選択肢の中から、正解と思ったボタンを押してください。
                    </div>
                    <div class="rule-item">
                        各問題の制限時間は<span class="rule-highlight">「60秒」</span>です。
                    </div>
                    <div class="rule-item">
                        正解の基本点100点に加え、早く回答するほど<span class="rule-highlight">「残り時間(秒) × 1点」</span>のボーナスが加算されます！
                    </div>
                    <div class="rule-item alert">
                        正答数が同じ場合は、回答までの時間が短いチームが優勝です！
                    </div>
                </div>
            `;
        } else if (cmd.type === 'start' || cmd.type === 'next') {
            db.ref('quizConfig/' + cmd.qIndex).once('value', s => {
                const data = s.val(); if(!data) return;
                let imageHtml = data.image ? `<div class="q-image-frame"><img src="${data.image}" class="q-image" onerror="this.style.display='none'"></div>` : '';
                view.innerHTML = `
                    <div class="q-header">QUESTION ${cmd.qIndex + 1}</div>
                    ${imageHtml}
                    <div class="q-text" style="${data.image ? '' : 'font-size: 8rem; margin-top: 100px;'}">${data.text || ''}</div>
                `;
            });
        } else if (cmd.type === 'close') {
            view.innerHTML = `<div class="timeup-msg">TIME UP!</div><p style="font-size:3rem;">回答を締め切りました</p>`;
        } else if (cmd.type === 'answer') {
            db.ref('quizConfig/' + cmd.qIndex).once('value', s => {
                const data = s.val(); if(!data) return;
                
                // ★ 正解用の画像があればそれを使用し、なければ問題用画像をそのまま使用する
                let dispImage = data.ansImage ? data.ansImage : data.image; 
                
                let imageTag = dispImage ? `<img src="${dispImage}" class="q-image" onerror="this.style.display='none'">` : '';
                let textStyle = dispImage ? 'font-size: 4rem; margin-top: 5px;' : 'font-size: 6rem; margin-top: 60px;';

                view.innerHTML = `
                    <div class="answer-view-compact">
                        <div class="q-header">QUESTION ${cmd.qIndex + 1} - 正解発表</div>
                        <div class="q-image-frame">${imageTag}</div>
                        <div class="q-text" style="${textStyle}">正解は <span style="color:#e74c3c; font-size: 1.1em;">「${data.ans}」</span> です！</div>
                    </div>
                `;
            });
        } else if (cmd.type === 'details') {
            view.innerHTML = `<div class="big-msg" style="font-size: 8rem; animation: pulse 1s infinite alternate;">結果発表！！</div><p style="font-size: 4rem; margin-top: 30px; color: #fff;">はたして優勝はどのチームか！？</p>`;
        } else if (cmd.type === 'ranking') {
            showRanking();
        } else if (cmd.type === 'end') {
            view.innerHTML = `<div class="big-msg">ALL FINISHED!</div><p style="font-size:3rem;">全問題が終了しました。お疲れ様でした！</p>`;
        }
    });

    function showRanking() {
        db.ref('quizConfig').once('value', qSnap => {
            const qCount = qSnap.val() ? qSnap.val().length : 0;

            db.ref('players').once('value', snap => {
                const players = snap.val() || {};
                let sorted = Object.values(players).sort((a, b) => (b.score || 0) - (a.score || 0));
                
                let html = `<div class="ranking-container">
                                <h1 style="color:#f1c40f; font-size:4.5rem; margin-bottom:20px; text-shadow: 0 0 20px rgba(241, 196, 15, 0.8);">FINAL RANKING</h1>
                                <table class="ranking-table">
                                    <thead>
                                        <tr>
                                            <th class="col-rank">RANK</th>
                                            <th class="col-team">TEAM</th>
                                            <th class="col-total">TOTAL</th>`;
                
                for(let i=0; i<qCount; i++) {
                    html += `<th style="width: 6.75%; min-width: 100px;">Q${i+1}</th>`; 
                }
                html += `</tr>
                        </thead>
                        <tbody>`;

                sorted.slice(0, 6).forEach((p, idx) => {
                    const isTop = idx === 0 ? 'top-1' : '';
                    const photo = p.photo ? `<img src="${p.photo}" class="team-avatar">` : `<span style="font-size:3rem; margin-right:20px; vertical-align:middle;">👤</span>`;
                    
                    let baseTotal = 0; let bonusTotal = 0;
                    for (let i = 0; i < qCount; i++) {
                        let h = p.history ? p.history[i] : null;
                        if (h && h.correct) { baseTotal += 100; bonusTotal += (h.points ? h.points - 100 : 0); }
                    }

                    html += `<tr class="${isTop}">
                        <td class="rank-number col-rank">${idx + 1}</td>
                        <td class="col-team" style="letter-spacing: 2px;">
                            ${photo} <span style="font-weight:bold;">${p.name || 'ゲスト'}</span>
                        </td>
                        <td class="col-total">
                            <div style="height: 4.5rem; display: flex; align-items: flex-end; justify-content: center; gap: 4px; margin-bottom: 5px;">
                                <span style="font-size: 4.2rem; font-weight: bold; color: #f1c40f; line-height: 0.85;">${p.score || 0}</span>
                                <span style="font-size: 1.8rem; color: #fff; font-weight: normal; line-height: 0.85;">pt</span>
                            </div>
                            <div class="bonus-points" style="height: 1.6rem; display: flex; align-items: flex-end; justify-content: center; line-height: 1;">
                                <span class="correct-bonus">正答:${baseTotal}</span><span style="margin: 0 6px; color:#777;">/</span><span class="time-bonus">ﾀｲﾑ:${bonusTotal}</span>
                            </div>
                        </td>`;
                    
                    for(let i=0; i<qCount; i++) {
                        let h = p.history ? p.history[i] : null;
                        if (h) {
                            let mark = h.correct ? '<span style="color:#2ecc71; font-weight:bold; font-size:3.8rem; line-height:0.85;">〇</span>' : '<span style="color:#e74c3c; font-weight:bold; font-size:3.8rem; line-height:0.85;">✖</span>';
                            if (h.choice === '未') mark = '<span style="color:#555; font-size:3.8rem; line-height:0.85;">-</span>';
                            let timeStr = h.time !== '--' ? `${h.time}秒` : '--';
                            
                            html += `<td style="text-align:center;">
                                        <div style="height: 4.5rem; display: flex; align-items: flex-end; justify-content: center; margin-bottom: 5px;">
                                            ${mark}
                                        </div>
                                        <div style="height: 1.6rem; display: flex; align-items: flex-end; justify-content: center; font-size:1.4rem; color:#aaa; line-height: 1;">
                                            ${timeStr}
                                        </div>
                                     </td>`;
                        } else {
                            html += `<td style="text-align:center; color:#555;">-</td>`;
                        }
                    }
                    html += `</tr>`;
                });
                html += `</tbody></table></div>`;
                view.innerHTML = html;
            });
        });
    }
</script>
</body>
</html>
