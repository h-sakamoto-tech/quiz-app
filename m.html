<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ・メインスクリーン (m)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        /* 16:9 の大型モニター・プロジェクターに最適化したデザイン */
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Meiryo, sans-serif; 
            overflow: hidden; 
            text-align: center;
        }

        #display-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        /* 🖼️ 設問画像エリア */
        .q-image-frame {
            height: 65vh;
            width: 90vw;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
        }

        .q-image {
            max-height: 100%;
            max-width: 100%;
            border: 6px solid #2ecc71;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(46, 204, 113, 0.4);
            object-fit: contain;
        }

        /* 📝 補足テキスト */
        .q-text {
            font-size: 4.5rem;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(0,0,0,1), 2px 2px 0px #2ecc71;
            line-height: 1.2;
            white-space: pre-wrap;
            max-width: 95vw;
        }

        .q-header {
            font-size: 3rem;
            color: #2ecc71;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 10px;
            border-bottom: 2px solid #2ecc71;
        }

        /* メッセージ表示 */
        .big-msg { font-size: 10rem; font-weight: bold; color: #f1c40f; text-shadow: 0 0 30px #f1c40f; }
        .timeup-msg { font-size: 12rem; color: #e74c3c; font-weight: bold; animation: pulse 0.5s infinite alternate; }
        
        @keyframes pulse { from { transform: scale(1); opacity: 1; } to { transform: scale(1.05); opacity: 0.7; } }

        /* 📊 ランキングテーブル */
        .ranking-container { width: 90%; }
        .ranking-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 15px;
            font-size: 3rem;
        }
        .ranking-table tr { background: rgba(255,255,255,0.05); border-radius: 15px; }
        .ranking-table th { color: #f1c40f; font-size: 2rem; padding: 10px; border-bottom: 2px solid #f1c40f; }
        .ranking-table td { padding: 20px; }
        .rank-number { font-size: 4rem; font-weight: bold; color: #3498db; }
        .top-1 { background: rgba(241, 196, 15, 0.2) !important; border: 2px solid #f1c40f; }
        .top-1 .rank-number { color: #f1c40f; }
        .team-avatar { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid #fff; vertical-align: middle; margin-right: 20px; }
    </style>
</head>
<body>

<div id="display-container">
    <div id="view-area">
        <div class="big-msg">SPEED QUIZ 2026</div>
        <p style="font-size: 3rem; color: #8892b0;">準備が整うまでお待ちください</p>
    </div>
</div>

<script>
    // Firebase初期設定（他画面と共通）
    const firebaseConfig = { 
        apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", 
        authDomain: "speed-quiz26.firebaseapp.com", 
        databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "speed-quiz26" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const view = document.getElementById('view-area');

    // 管理者からの命令を監視
    db.ref('adminCommand').on('value', snap => {
        const cmd = snap.val();
        if (!cmd) return;

        if (cmd.type === 'start' || cmd.type === 'next') {
            // 第n問 表示
            db.ref('quizConfig/' + cmd.qIndex).once('value', s => {
                const data = s.val();
                if(!data) return;
                view.innerHTML = `
                    <div class="q-header">QUESTION ${cmd.qIndex + 1}</div>
                    <div class="q-image-frame">
                        ${data.image ? `<img src="${data.image}" class="q-image">` : `<div class="big-msg">NO IMAGE</div>`}
                    </div>
                    <div class="q-text">${data.text || ''}</div>
                `;
            });
        } else if (cmd.type === 'close') {
            // タイムアップ演出
            view.innerHTML = `<div class="timeup-msg">TIME UP!</div><p style="font-size:3rem;">回答を締め切りました</p>`;
        } else if (cmd.type === 'rules') {
            view.innerHTML = `<div class="big-msg">RULES</div><p style="font-size:4rem; color:#2ecc71;">スクリーンを見て、スマホで素早くタップ！</p>`;
        } else if (cmd.type === 'ranking') {
            // 総合順位の表示
            showRanking();
        } else if (cmd.type === 'end') {
            view.innerHTML = `<div class="big-msg">ALL FINISHED!</div><p style="font-size:3rem;">全問題が終了しました。結果発表をお楽しみに！</p>`;
        } else if (cmd.type === 'reset') {
            location.reload();
        }
    });

    // ランキング描画処理
    function showRanking() {
        db.ref('players').once('value', snap => {
            const players = snap.val() || {};
            let sorted = Object.values(players).sort((a, b) => (b.score || 0) - (a.score || 0));
            
            let html = `<div class="ranking-container">
                            <h1 style="color:#f1c40f; font-size:5rem; margin-bottom:30px;">FINAL RANKING</h1>
                            <table class="ranking-table">
                                <tr><th>RANK</th><th>TEAM NAME</th><th>TOTAL SCORE</th></tr>`;

            // 上位5チームを表示
            sorted.slice(0, 5).forEach((p, idx) => {
                const isTop = idx === 0 ? 'top-1' : '';
                const photo = p.photo ? `<img src="${p.photo}" class="team-avatar">` : `<span style="font-size:4rem; margin-right:20px;">👤</span>`;
                html += `
                    <tr class="${isTop}">
                        <td class="rank-number">${idx + 1}</td>
                        <td style="text-align:left; padding-left:100px;">${photo} <span>${p.name || 'ゲスト'}</span></td>
                        <td style="font-weight:bold; color:#f1c40f;">${p.score || 0} <small>pt</small></td>
                    </tr>
                `;
            });

            html += `</table></div>`;
            view.innerHTML = html;
        });
    }
</script>
</body>
</html>
