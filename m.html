<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スピードクイズ・メインスクリーン (m)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        /* 16:9 の大型モニターを想定したサイバーデザイン */
        body { 
            margin: 0; 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Meiryo, sans-serif; 
            overflow: hidden; 
            text-align: center;
        }

        #display-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 🖼️ 設問画像：画面の高さの約60%を占有 */
        .q-image {
            max-height: 60vh;
            max-width: 90vw;
            border: 5px solid #2ecc71;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.4);
            object-fit: contain;
            display: none;
        }

        /* 📝 補足テキスト：大きく、読みやすく */
        .q-text {
            font-size: 4.5rem;
            font-weight: bold;
            margin-top: 40px;
            color: #ffffff;
            text-shadow: 4px 4px 20px rgba(0,0,0,1);
            line-height: 1.2;
            white-space: pre-wrap; /* 改行を反映 */
        }

        .q-header {
            font-size: 2.5rem;
            color: #2ecc71;
            margin-bottom: 20px;
            letter-spacing: 5px;
        }

        /* 特殊状態のスタイル */
        .status-msg { font-size: 8rem; color: #f1c40f; font-weight: bold; }
        .timeup-msg { font-size: 10rem; color: #e74c3c; font-weight: bold; animation: blink 0.5s infinite alternate; }
        
        @keyframes blink { from { opacity: 1; } to { opacity: 0.3; } }

        /* 📊 ランキングテーブル */
        .ranking-table {
            width: 80%;
            border-collapse: collapse;
            font-size: 2.5rem;
            margin-top: 20px;
        }
        .ranking-table th { color: #f1c40f; border-bottom: 3px solid #f1c40f; padding: 20px; }
        .ranking-table td { padding: 15px; border-bottom: 1px solid #444; }
        .top-rank { color: #f1c40f; font-weight: bold; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid #fff; }
    </style>
</head>
<body>

<div id="display-container">
    <div id="content">
        <h1 class="status-msg">SPEED QUIZ 2026</h1>
        <p style="font-size: 2rem; color: #8892b0;">準備中... 参加者はQRコードから入ってください</p>
    </div>
</div>

<script>
    // Firebase初期設定（管理者画面・スマホ画面と統一してください）
    var firebaseConfig = { 
        apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", 
        authDomain: "speed-quiz26.firebaseapp.com", 
        databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "speed-quiz26" 
    };
    firebase.initializeApp(firebaseConfig);
    var db = firebase.database();

    const container = document.getElementById('content');

    // 管理者の命令を監視
    db.ref('adminCommand').on('value', snap => {
        const cmd = snap.val();
        if (!cmd) return;

        if (cmd.type === 'start' || cmd.type === 'next') {
            // 問題表示：Firebaseから画像とテキストを取得
            db.ref('quizConfig/' + cmd.qIndex).once('value', s => {
                const data = s.val();
                container.innerHTML = `
                    <div class="q-header">QUESTION ${cmd.qIndex + 1}</div>
                    ${data.image ? `<img src="${data.image}" class="q-image" style="display:block;">` : ''}
                    <div class="q-text">${data.text || ''}</div>
                `;
            });
        } else if (cmd.type === 'close') {
            // 受付終了
            container.innerHTML = `<div class="timeup-msg">TIME UP!</div>`;
        } else if (cmd.type === 'rules') {
            container.innerHTML = `<div class="status-msg">RULE EXPLANATION</div><p style="font-size:3rem;">スマホのボタンで素早く回答してください！</p>`;
        } else if (cmd.type === 'ranking') {
            // ランキング表示（上位5チームを表示）
            showRanking();
        } else if (cmd.type === 'end') {
            container.innerHTML = `<div class="status-msg">FINISH!!</div><p style="font-size:3rem;">全問題が終了しました。集計中です...</p>`;
        }
    });

    function showRanking() {
        db.ref('players').once('value', snap => {
            const players = snap.val() || {};
            // スコア順にソート
            let sorted = Object.values(players).sort((a, b) => (b.score || 0) - (a.score || 0));
            
            let tableHtml = `
                <h1 style="color:#f1c40f; font-size:4rem;">LEADERBOARD</h1>
                <table class="ranking-table">
                    <tr><th>RANK</th><th>TEAM</th><th>SCORE</th></tr>
            `;

            sorted.slice(0, 5).forEach((p, idx) => {
                const rankClass = idx === 0 ? 'top-rank' : '';
                const avatar = p.photo ? `<img src="${p.photo}" class="avatar-img">` : '';
                tableHtml += `
                    <tr class="${rankClass}">
                        <td>${idx + 1}</td>
                        <td style="display:flex; align-items:center; justify-content:center; gap:20px;">
                            ${avatar} <span>${p.name}</span>
                        </td>
                        <td>${p.score || 0} <span style="font-size:1.5rem;">pt</span></td>
                    </tr>
                `;
            });

            tableHtml += `</table>`;
            container.innerHTML = tableHtml;
        });
    }
</script>
</body>
</html>
