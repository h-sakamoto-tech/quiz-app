<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会場スクリーン</title>

    <style>
        body { margin: 0; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: radial-gradient(circle, #1a2a6c, #112b3c, #000000); color: #fff; overflow: hidden; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 50px; box-sizing: border-box; animation: fadeIn 0.8s ease-out forwards; position: relative; }
        .active { display: flex; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes popUp { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* 待機・ルール画面 */
        #wait-screen h1 { font-size: 60px; color: #f1c40f; margin-bottom: 20px; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .qr-box { background: #fff; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px; }
        .qr-box img { width: 300px; height: 300px; object-fit: contain; }
        .player-count { font-size: 40px; font-weight: bold; background: #e74c3c; padding: 10px 40px; border-radius: 50px; margin-bottom: 30px; }
        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; max-width: 90%; }
        .player-badge { background: rgba(255,255,255,0.2); padding: 10px 20px; border-radius: 10px; font-size: 24px; font-weight: bold; animation: popUp 0.5s ease-out forwards; }
        #rules-screen h1 { font-size: 80px; color: #e74c3c; margin-bottom: 50px; text-shadow: 0 0 30px rgba(231, 76, 60, 0.8); }
        .rule-text { font-size: 50px; line-height: 1.6; text-align: left; background: rgba(0,0,0,0.6); padding: 60px; border-radius: 20px; border: 4px solid #f1c40f; max-width: 80%; }

        /* クイズ画面 */
        .q-header { font-size: 50px; color: #f1c40f; margin-bottom: 20px; font-weight: bold; text-shadow: 2px 2px 10px #000; }
        .q-text { font-size: 70px; font-weight: bold; margin-bottom: 30px; line-height: 1.3; text-shadow: 2px 2px 10px #000; }
        .q-image { max-width: 600px; max-height: 400px; border-radius: 15px; border: 5px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px; display: none; }
        
        /* タイマー表示のスタイル追加 */
        .timer-box { position: absolute; top: 30px; right: 40px; font-size: 50px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 15px 30px; border-radius: 20px; border: 3px solid #f1c40f; display: flex; align-items: center; gap: 15px; transition: color 0.3s; }
        .timer-urgent { color: #e74c3c; animation: popUp 0.5s infinite alternate; border-color: #e74c3c; }
        
        .status-badge { font-size: 40px; padding: 15px 40px; border-radius: 50px; font-weight: bold; margin-top: 20px; }
        .status-thinking { background: #3498db; animation: pulse 2s infinite; }
        .status-closed { background: #e74c3c; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .correct-ans { font-size: 80px; color: #2ecc71; font-weight: bold; margin-top: 30px; animation: popUp 0.5s ease-out forwards; text-shadow: 0 0 30px #2ecc71; display: none; }

        /* 終了・結果画面 */
        #end-screen h1 { font-size: 150px; color: #fff; text-shadow: 0 0 50px #e74c3c, 0 0 100px #e74c3c; animation: popUp 1s ease-out forwards; letter-spacing: 20px; margin: 0; }
        .title-text { font-size: 70px; color: #f1c40f; margin-bottom: 40px; border-bottom: 5px solid #f1c40f; padding-bottom: 10px; }
        .ranking-box { display: flex; flex-direction: column; gap: 20px; width: 80%; }
        .rank-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 20px 40px; border-radius: 15px; font-size: 40px; font-weight: bold; }
        .rank-1 { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7); color: #000; transform: scale(1.05); border: 2px solid #fff; }
