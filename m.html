<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>会場スクリーン</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; cursor: none; }
        .screen { display:none; width:100vw; height:100vh; flex-direction:column; align-items:center; justify-content:center; text-align:center; box-sizing:border-box;}
        .active { display:flex !important; }
        .qr-container { background:#fff; padding:20px; border-radius:20px; }
        .qr-container img { width:400px; height:400px; }
        .q-text { font-size:45px; text-align:left; width:90%; white-space:pre-wrap; background:rgba(255,255,255,0.1); padding:30px; border-radius:15px; }
        .timer { font-size:100px; position:absolute; top:20px; right:40px; color:#f1c40f; }
        .title-large { font-size:80px; color:#f1c40f; margin:0 0 20px 0; }
        .rule-box { font-size:32px; line-height:1.6; text-align:left; background:rgba(0,0,0,0.5); padding:40px 60px; border-radius:20px; border:3px solid #3498db; max-width:90%; }
        .highlight-y { color:#f1c40f; font-weight:bold; } .highlight-g { color:#2ecc71; font-weight:bold; } .highlight-r { color:#e74c3c; font-weight:bold; }
        
        .proj-table-container { width: 95%; max-height: 80vh; overflow-y: auto; background: rgba(0,0,0,0.7); border-radius: 10px; border: 2px solid #555; }
        .proj-table { width: 100%; border-collapse: collapse; font-size: 22px; text-align: center; }
        .proj-table th { background: #34495e; color: #fff; padding: 10px; position: sticky; top: 0; z-index: 1; border: 1px solid #2c3e50; }
        .proj-table td { border: 1px solid #444; padding: 8px 4px; line-height: 1.1; vertical-align:middle; }
        .proj-table tr:nth-child(even) { background: rgba(255,255,255,0.05); }
        .pt-rank { font-weight: bold; color: #f1c40f; font-size: 26px; }
        .pt-score { color: #f1c40f; font-weight: bold; font-size: 28px; }
        .pt-o { color: #2ecc71; font-weight: bold; font-size: 26px; }
        .pt-x { color: #e74c3c; font-weight: bold; font-size: 26px; }
        .pt-time { font-size: 14px; color: #ccc; display: block; }
        
        .avatar-badge { display:flex; align-items:center; background:#2980b9; padding:5px 15px 5px 5px; border-radius:25px; font-size:20px; }

        /* 📸 サムネイルとチーム名の強力なレイアウト制御（プロジェクター用） */
        .avatar-large { 
            width: 45px; 
            height: 45px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #fff; 
            flex-shrink: 0; /* 画像が押し潰されるのを防ぐ */
            margin: 0;
        }

        .team-name-cell {
            display: flex; /* 横並びにする */
            align-items: center; /* 縦の中央揃え */
            justify-content: flex-start; /* 写真と文字を左揃えで密着させる */
            gap: 12px; /* 写真と文字のすき間 */
            width: max-content; /* 枠の幅を中身に合わせる（改行防止） */
            margin: 0 auto; /* このブロック自体をセルの中央に配置する */
            white-space: nowrap; /* 絶対に改行させない */
            font-weight: bold;
            font-size: 24px;
        }
    </style>
</head>
<body onclick="enableAudio()">

    <div id="wait-screen" class="screen active">
        <h1 style="font-size:60px; color:#f1c40f;">スピードクイズ</h1>
        <div class="qr-container"><img src="./qrcode.png"></div>
        <h2 style="font-size:30px; margin-top:20px;">参加チーム: <span id="p-count">0</span></h2>
        <div id="p-list" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:20px; justify-content:center; width:90%;"></div>
    </div>

    <div id="rules-screen" class="screen" style="background:#2c3e50;">
        <h1 class="title-large">ルール説明</h1>
        <div class="rule-box">
            それではスピードクイズの時間がやってまいりました！全部で<span class="highlight-y">10問</span>出題します。<br><br>
            スマホ画面の選択肢の中から正解と思ったボタンを押してください。<br>
            各問題の制限時間は<span class="highlight-r">「60秒」</span>です。<br><br>
            このクイズは正解しただけの得点ではありません。<br>
            正解の基本点100点に加え、早く回答するほど<span class="highlight-g">「残り時間(秒) × 1点」のボーナス</span>が加算されます！<br>
            正答数が同じ場合は、回答までの時間が短いチームが優勝です！<br><br>
            <div style="text-align:center; font-size:45px; margin-top:15px;" class="highlight-y">皆さん全力でがんばってください！</div>
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="timer" id="timer-disp">60</div>
        <h2 id="q-num" style="font-size:40px; color:#f1c40f; margin:0 0 20px 0;">第 1 問</h2>
        <div class="q-text" id="q-txt"></div>
        <h1 id="ans-disp" style="font-size:120px; color:#2ecc71; display:none; margin-top:30px;">正解: <span></span></h1>
    </div>

    <div id="end-screen" class="screen"><h1 class="title-large" style="font-size:120px;">全問終了！</h1></div>
    <div id="details-screen" class="screen" style="background:#1a252f;"><h1 class="title-large" style="font-size:120px;">結果発表</h1></div>
    <div id="ranking-screen" class="screen" style="background:#1a252f;">
        <h1 class="title-large" style="font-size:60px; margin-bottom:10px;">👑 総合順位 👑</h1>
        <div class="proj-table-container" id="matrix-list"></div>
    </div>

<script>
    var firebaseConfig = { apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", authDomain: "speed-quiz26.firebaseapp.com", databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "speed-quiz26" };
    firebase.initializeApp(firebaseConfig); var db = firebase.database();
    
    const pageLoadTime = Date.now();
    let qData = []; let sUrls = {}; let timer = null; let playersData = {};
    let globalQCount = 0; const audioPool = {};
    let audioReady = false; function enableAudio() { audioReady = true; }

    // ★ 写真がないチームの「👤」も、写真と同じ丸いサイズに固定して縦ズレを防ぐ
    function getAvatarHTML(p) {
        return p.photo 
            ? `<img src="${p.photo}" class="avatar-large">` 
            : `<div class="avatar-large" style="display:flex;align-items:center;justify-content:center;background:#555;font-size:24px;margin:0;">👤</div>`;
    }

    db.ref('quizConfig').on('value', s => { qData = s.val() || []; globalQCount = qData.length; });
    db.ref('soundConfig').on('value', s => sUrls = s.val() || {});
    db.ref('players').on('value', s => {
        playersData = s.val() || {}; 
        document.getElementById('p-count').innerText = Object.keys(playersData).length;
        document.getElementById('p-list').innerHTML = Object.values(playersData).map(v => `
            <div class="avatar-badge">${getAvatarHTML(v)} <span style="margin-left:8px;">${v.name}</span></div>
        `).join('');
    });

    db.ref('adminCommand').on('value', snap => {
        const c = snap.val(); if(!c) return;
        if(c.type === 'reset' && c.ts > pageLoadTime) { location.reload(); return; }

        if(c.type === 'rules') { switchScreen('rules-screen'); play('sndRules'); } 
        else if(c.type === 'start' || c.type === 'next') {
            const q = qData[c.qIndex]; if(!q) return;
            document.getElementById('q-num').innerText = `第 ${c.qIndex+1} 問`;
            document.getElementById('q-txt').innerText = q.text;
            document.getElementById('ans-disp').style.display = 'none';
            switchScreen('quiz-screen'); play('sndStart'); startTimer();
        } 
        else if(c.type === 'close') {
            if(timer) clearInterval(timer);
            document.getElementById('ans-disp').querySelector('span').innerText = qData[c.qIndex]?.ans || "";
            document.getElementById('ans-disp').style.display = 'block';
            play('sndNext'); 
        } 
        else if(c.type === 'end') { switchScreen('end-screen'); play('sndEnd'); } 
        else if(c.type === 'details') { switchScreen('details-screen'); play('sndDetails'); }
        else if(c.type === 'ranking') { 
            let sorted = Object.values(playersData).sort((a,b) => (b.score || 0) - (a.score || 0));
            let html = `<table class="proj-table"><tr><th>順位</th><th style="text-align:center;">チーム名</th><th>合計pt</th>`;
            for(let i=0; i<globalQCount; i++) html += `<th>Q${i+1}</th>`;
            html += `</tr>`;

            sorted.forEach((p, index) => {
                let av = getAvatarHTML(p);
                
                // ★ ポイント内訳の計算
                let baseTotal = 0; let bonusTotal = 0;
                for (let i = 0; i < globalQCount; i++) {
                    let h = p.history ? p.history[i] : null;
                    if (h && h.correct) {
                        baseTotal += 100;
                        bonusTotal += (h.points ? h.points - 100 : 0);
                    }
                }
                
                // ★ 修正：チーム名列に「team-name-cell」クラスを適用し、1行＆中央配置
                html += `<tr><td class="pt-rank">${index+1}</td>
                <td><div class="team-name-cell">${av}<span>${p.name}</span></div></td>
                <td class="pt-score" style="line-height:1.3;">
                    ${p.score||0}<br>
                    <span style="font-size:16px; color:#2ecc71;">正答:${baseTotal}</span><br>
                    <span style="font-size:16px; color:#3498db;">ﾀｲﾑ:${bonusTotal}</span>
                </td>`;
                
                for(let i=0; i<globalQCount; i++) {
                    let h = p.history ? p.history[i] : null;
                    if(h) {
                        let mark = h.correct ? '<span class="pt-o">〇</span>' : '<span class="pt-x">✖</span>';
                        if(h.choice === '未') mark = '<span style="color:#7f8c8d;">-</span>';
                        let timeStr = h.time !== '--' ? `${h.time}秒` : '--';
                        html += `<td>${mark}<span class="pt-time">${timeStr}</span></td>`;
                    } else { html += `<td>-</td>`; }
                }
                html += `</tr>`;
            });
            html += `</table>`;
            document.getElementById('matrix-list').innerHTML = html;
            switchScreen('ranking-screen'); play('sndRanking'); 
        }
        else if(c.type === 'wait') { switchScreen('wait-screen'); }
    });

    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    
    function play(k) { 
        if(!sUrls[k]) return;
        if (!audioPool[k]) { audioPool[k] = new Audio(sUrls[k]); }
        const a = audioPool[k]; a.currentTime = 0;
        a.play().catch(e => {
            let w = document.getElementById('audio-warning');
            if(!w) {
                w = document.createElement('div'); w.id = 'audio-warning';
                w.innerHTML = "🔇 音声がブロックされています！<br>ここを1回クリックしてください";
                w.style.cssText = "position:fixed; top:20px; left:50%; transform:translateX(-50%); background:#e74c3c; color:#fff; padding:20px 40px; border-radius:15px; font-size:28px; font-weight:bold; cursor:pointer; z-index:9999; box-shadow:0 10px 20px rgba(0,0,0,0.5); text-align:center;";
                w.onclick = () => { w.remove(); a.play(); }; document.body.appendChild(w);
            }
        }); 
    }

    function startTimer() {
        let l = 60; document.getElementById('timer-disp').innerText = l;
        if(timer) clearInterval(timer);
        timer = setInterval(() => { l--; document.getElementById('timer-disp').innerText = l; if(l<=0) clearInterval(timer); }, 1000);
    }
</script>
</body>
</html>
