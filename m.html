<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会場スクリーン</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { margin: 0; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: radial-gradient(circle, #1a2a6c, #112b3c, #000000); color: #fff; overflow: hidden; }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 50px; box-sizing: border-box; animation: fadeIn 0.8s ease-out forwards; position: relative; }
        .active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.75); } to { opacity: 1; transform: scale(0.85); } }
        @keyframes popUp { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }

        #wait-screen { grid-template-columns: 1fr 1fr; gap: 50px; align-items: center; justify-items: center; padding: 80px; }
        #wait-screen.wait-active { display: grid; }
        .wait-left { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        #wait-screen h1 { font-size: 100px; color: #f1c40f; margin: 0; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .qr-box { background: #fff; padding: 40px; border-radius: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
        .qr-box img { width: 600px; height: 600px; object-fit: contain; }
        .wait-right { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: flex-start; }
        .player-count { font-size: 70px; font-weight: bold; background: #e74c3c; padding: 20px 60px; border-radius: 80px; margin-bottom: 50px; box-shadow: 0 10px 0px #b03a2e; }
        .player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; justify-content: center; }
        .player-badge { background: rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 20px; font-size: 40px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 15px; animation: popUp 0.5s ease-out forwards; }

        #rules-screen h1 { font-size: 80px; color: #e74c3c; margin-bottom: 50px; text-shadow: 0 0 30px rgba(231, 76, 60, 0.8); }
        .rule-text { font-size: 42px; line-height: 1.6; text-align: left; background: rgba(0,0,0,0.6); padding: 50px; border-radius: 20px; border: 4px solid #f1c40f; max-width: 90%; }

        .q-header { font-size: 50px; color: #f1c40f; margin-bottom: 20px; font-weight: bold; }
        .q-text { font-size: 70px; font-weight: bold; margin-bottom: 30px; line-height: 1.3; }
        .q-image { max-width: 600px; max-height: 400px; border-radius: 15px; border: 5px solid #fff; margin-bottom: 30px; display: none; }
        .timer-box { font-size: 130px; font-weight: bold; background: rgba(0,0,0,0.7); padding: 20px 80px; border-radius: 60px; border: 10px solid #f1c40f; display: flex; align-items: center; justify-content: center; gap: 40px; margin-bottom: 50px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .timer-urgent { color: #e74c3c; animation: popUp 0.5s infinite alternate; border-color: #e74c3c; }
        .status-badge { font-size: 40px; padding: 15px 40px; border-radius: 50px; font-weight: bold; margin-top: 20px; }
        .status-thinking { background: #3498db; animation: pulse 2s infinite; }
        .status-closed { background: #e74c3c; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .correct-ans { font-size: 80px; color: #2ecc71; font-weight: bold; margin-top: 30px; animation: popUp 0.5s ease-out forwards; display: none; }

        /* --- 【ド派手修正】ここから終了画面のスタイル --- */
        #end-screen {
            background: radial-gradient(circle, #000 0%, #111 60%, #e74c3c 100%); /* 終了時だけ背景を少し赤く */
            overflow: visible; /* アニメーションがはみ出さないように */
        }

        #end-screen h1 {
            font-size: 300px; /* 超巨大化 */
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: -10px;
            margin: 0;
            padding: 0;
            line-height: 1;

            text-shadow:
                0 0
