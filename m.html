<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8"><title>会場スクリーン</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; text-align:center; }
        .screen { display:none; width:100vw; height:100vh; flex-direction:column; align-items:center; justify-content:center; }
        .active { display:flex !important; }
        .q-text { font-size:40px; text-align:left; width:90%; white-space:pre-wrap; background:rgba(255,255,255,0.1); padding:20px; }
        .timer { font-size:100px; position:absolute; top:20px; right:40px; color:#f1c40f; }
        .player-badge { background:#2980b9; padding:10px 20px; border-radius:10px; margin:5px; font-size:24px; }
    </style>
</head>
<body>
    <div id="wait" class="screen active">
        <h1 style="font-size:80px;">スピードクイズ</h1>
        <div style="background:#fff; padding:20px;"><img src="./qrcode.png" width="400"></div>
        <h2 style="font-size:40px;">参加チーム: <span id="pc">0</span></h2>
        <div id="pl" style="display:flex; flex-wrap:wrap; justify-content:center;"></div>
    </div>
    <div id="quiz" class="screen">
        <div class="timer" id="tm">60</div>
        <h2 id="q-num" style="font-size:40px;">第 1 問</h2>
        <div class="q-text" id="q-txt"></div>
        <h1 id="ans" style="font-size:120px; color:#2ecc71; display:none;">正解: <span></span></h1>
    </div>
    <audio id="snd"></audio>
<script>
    const firebaseConfig = { apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0", authDomain: "speed-quiz26.firebaseapp.com", databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "speed-quiz26" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    let qData = []; let sUrls = {}; let timer = null;

    db.ref('quizConfig').on('value', s => qData = s.val() || []);
    db.ref('soundConfig').on('value', s => sUrls = s.val() || {});
    db.ref('players').on('value', s => {
        const p = s.val() || {}; document.getElementById('pc').innerText = Object.keys(p).length;
        document.getElementById('pl').innerHTML = Object.values(p).map(v => `<div class="player-badge">${v.name}</div>`).join('');
    });

    db.ref('adminCommand').on('value', s => {
        const c = s.val(); if(!c) return;
        if(c.type === 'rules') { switchScreen('wait'); play('rules'); }
        if(c.type === 'start' || c.type === 'next') { 
            const q = qData[c.qIndex]; document.getElementById('q-num').innerText = `第${c.qIndex+1}問`;
            document.getElementById('q-txt').innerText = q.text;
            document.getElementById('ans').style.display = 'none';
            switchScreen('quiz'); play(c.type); startTimer();
        }
        if(c.type === 'close') { clearInterval(timer); document.getElementById('ans').style.display='block'; document.getElementById('ans').querySelector('span').innerText = qData[c.qIndex].ans; play('rules'); }
    });

    function switchScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function play(k) { if(sUrls[k]) { const a = document.getElementById('snd'); a.src = sUrls[k]; a.play(); } }
    function startTimer() {
        let l = 60; document.getElementById('tm').innerText = l;
        if(timer) clearInterval(timer);
        timer = setInterval(() => { l--; document.getElementById('tm').innerText = l; if(l<=0) clearInterval(timer); }, 1000);
    }
</script>
</body>
</html>
