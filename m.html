<script>
    // ... (Firebase初期設定はそのまま) ...

    // ★【重要】Firebaseから「音源URL」を自動で受け取ってセットする機能
    db.ref('soundConfig').on('value', snap => {
        const snds = snap.val() || {};
        if(snds.sndRules) document.getElementById('sndRules').src = snds.sndRules;
        if(snds.sndStart) document.getElementById('sndStart').src = snds.sndStart;
        if(snds.sndNext) document.getElementById('sndNext').src = snds.sndNext;
        if(snds.sndEnd) document.getElementById('sndEnd').src = snds.sndEnd;
        if(snds.sndDetails) document.getElementById('sndDetails').src = snds.sndDetails;
        if(snds.sndRanking) document.getElementById('sndRanking').src = snds.sndRanking;
    });

    // ... (その他の進行ロジックはそのまま) ...
</script>
