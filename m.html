<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会場スクリーン</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        /* ベーススタイル（プロジェクター用ダークテーマ） */
        body { margin: 0; font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; background: radial-gradient(circle, #1a2a6c, #112b3c, #000000); color: #fff; overflow: hidden; }
        
        /* 画面共通設定 */
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 50px; box-sizing: border-box; animation: fadeIn 0.8s ease-out forwards; position: relative; }
        /* 通常画面の切り替えクラス */
        .screen.active { display: flex; }
        
        /* ★プロジェクター用全体縮小（85%） */
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.75); } 
            to { opacity: 1; transform: scale(0.85); } 
        }
        @keyframes popUp { 0% { transform: scale(0); } 80% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* =========================================
           ① 待機画面（QRコード・特大＆左右レイアウト）
           ========================================= */
        #wait-screen {
            display: none; /* 初期非表示 */
            /* 左右2カラムレイアウトへ変更 */
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 50px;
            align-items: center;
            justify-items: center;
            padding: 80px; /* 余白を多めに */
        }
        /* JSで制御する待機画面用切り替えクラス */
        #wait-screen.wait-active { display: grid; }

        /* 左側（タイトルとQR） */
        .wait-left { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        
        /* 変更点：タイトル文字（60px -> 100px / 約1.6倍） */
        #wait-screen h1 { font-size: 100px; color: #f1c40f; margin: 0; text-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        
        /* 変更点：QRボックス（padding/radius 2倍） */
        .qr-box { background: #fff; padding: 40px; border-radius: 40px; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
        
        /* 変更点：QR画像サイズ（300px -> 600px / 2倍！） */
        .qr-box img { width: 600px; height: 600px; object-fit: contain; }

        /* 右側（人数とリスト） */
        .wait-right { display: flex; flex-direction: column; align-items: center; width: 100%; height: 100%; justify-content: flex-start; }

        /* 変更点：参加者数文字・枠（font 40px -> 70px / 約1.75倍） */
        .player-count { font-size: 70px; font-weight: bold; background: #e74c3c; padding: 20px 60px; border-radius: 80px; margin-bottom: 50px; box-shadow: 0 10px 0px #b03a2e; }
        
        /* 参加者リストのグリッド調整 */
        .player-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; width: 100%; justify-content: center; }
        
        /* 変更点：名前バッジ文字・枠（font 24px -> 40px / 約1.6倍） */
        .player-badge { background: rgba(255,255,255,0.2); padding: 15px 30px; border-radius: 20px; font-size: 40px; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 15px; animation: popUp 0.5s ease-out forwards; }

        /* =========================================
           ② ルール説明画面
           ========================================= */
        #rules-screen h1 { font-size: 80px; color: #e74c3c; margin-bottom: 50px; text-shadow: 0 0 30px rgba(231, 76, 60, 0.8); }
        .rule-text { font-size: 50px; line-height: 1.6; text-align: left; background: rgba(0,0,0,0.6); padding: 60px; border-radius: 20px; border: 4px solid #f1c40f; max-width: 80%; }

        /* =========================================
           ③ クイズ画面（超巨大タイマー）
           ========================================= */
        .q-header { font-size: 50px; color: #f1c40f; margin-bottom: 20px; font-weight: bold; text-shadow: 2px 2px 10px #000; }
        .q-text { font-size: 70px; font-weight: bold; margin-bottom: 30px; line-height: 1.3; text-shadow: 2px 2px 10px #000; }
        .q-image { max-width: 600px; max-height: 400px; border-radius: 15px; border: 5px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 30px; display: none; }
        
        /* 超巨大タイマー（画面中央上部に配置） */
        .timer-box { 
            font-size: 130px; /* 特大文字 */
            font-weight: bold; 
            background: rgba(0,0,0,0.7); 
            padding: 20px 80px; 
            border-radius: 60px; 
            border: 10px solid #f1c40f; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 40px; 
            transition: color 0.3s; 
            margin-bottom: 50px; /* 問題文との間隔 */
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .timer-urgent { color: #e74c3c; animation: popUp 0.5s infinite alternate; border-color: #e74c3c; }
        
        .status-badge { font-size: 40px; padding: 15px 40px; border-radius: 50px; font-weight: bold; margin-top: 20px; }
        .status-thinking { background: #3498db; animation: pulse 2s infinite; }
        .status-closed { background: #e74c3c; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .correct-ans { font-size: 80px; color: #2ecc71; font-weight: bold; margin-top: 30px; animation: popUp 0.5s ease-out forwards; text-shadow: 0 0 30px #2ecc71; display: none; }

        /* =========================================
           ④〜⑥ 終了・結果・ランキング画面
           ========================================= */
        #end-screen h1 { font-size: 150px; color: #fff; text-shadow: 0 0 50px #e74c3c, 0 0 100px #e74c3c; animation: popUp 1s ease-out forwards; letter-spacing: 20px; margin: 0; }
        .title-text { font-size: 70px; color: #f1c40f; margin-bottom: 40px; border-bottom: 5px solid #f1c40f; padding-bottom: 10px; }
        
        /* 詳細結果テーブル */
        .details-table-wrapper { width: 95%; max-height: 65vh; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 20px; border-radius: 15px; border: 2px solid #555; }
        table { width: 100%; border-collapse: collapse; color: #fff; font-size: 24px; }
        th, td { border: 1px solid #7f8c8d; padding: 15px 10px; text-align: center; }
        th { background: #2980b9; position: sticky; top: -20px; z-index: 10; font-size: 26px; }
        .td-correct { color: #2ecc71; font-weight: bold; }
        .td-wrong { color: #e74c3c; font-weight: bold; }
        .td-time { font-size: 16px; color: #bdc3c7; display: block; margin-top: 5px; }
        
        /* 総合ランキング（トップ3） */
        .ranking-box { display: flex; flex-direction: column; gap: 20px; width: 80%; }
        .rank-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.1); padding: 20px 40px; border-radius: 15px; font-size: 40px; font-weight: bold; }
        .rank-1 { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7); color: #000; transform: scale(1.1); border: 3px solid #fff; box-shadow: 0 0 30px rgba(241, 196, 15, 0.5); z-index: 3; }
        .rank-2 { background: linear-gradient(135deg, #e3e3e3, #ffffff, #a3a3a3); color: #000; transform: scale(1.05); z-index: 2; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #ffdab9, #8b4513); color: #000; }
    </style>
</head>
<body>

    <div id="wait-screen" class="screen">
        <div class="wait-left">
            <h1>スピードクイズ 大会会場</h1>
            <div class="qr-box">
                <img src="./qrcode.png" alt="参加用QRコード">
            </div>
        </div>
        
        <div class="wait-right">
            <div class="player-count">現在の参加者: <span id="p-count">0</span> 名</div>
            <div class="player-list" id="p-list">
                </div>
        </div>
    </div>

    <div id="rules-screen" class="screen">
        <h1>受付終了！</h1>
        <div class="rule-text">
            それではスピードクイズの時間がやってまいりました！全部で10問出題します。<br><br>
            スマホ画面の選択肢の中から正解と思ったボタンを押してください。<span style="color: #e74c3c; font-weight: bold;">各問題の制限時間は「20秒」です。</span><br><br>
            このクイズは正解しただけの得点ではありません。<br>
            <span style="color: #f1c40f; font-weight: bold;">正解の基本点100点に加え、早く回答するほど「残り時間(秒) × 10点」のボーナスが加算されます！</span><br><br>
            皆さん全力でがんばってください！
        </div>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="timer-box" id="timer-display"><i class="fas fa-stopwatch"></i> <span id="time-left">20</span> 秒</div>
        
        <div class="q-header" id="disp-qnum">第 1 問</div>
        <div class="q-text" id="disp-qtext">問題がここに表示されます</div>
        <img id="disp-qimg" class="q-image" src="">
        
        <div id="disp-status" class="status-badge status-thinking">⏳ 回答受付中...</div>
        <div id="disp-ans" class="correct-ans">正解は：<span id="ans-text"></span></div>
    </div>

    <div id="end-screen" class="screen">
        <h1>終了！</h1>
    </div>
    
    <div id="details-screen" class="screen">
        <div class="title-text">📊 全員の結果発表</div>
        <div id="details-container" class="details-table-wrapper"></div>
    </div>
    
    <div id="ranking-screen" class="screen">
        <div class="title-text">🏆 総合ランキング トップ3 🏆</div>
        <div class="ranking-box" id="ranking-container"></div>
    </div>

    <script>
        // ★★★ Firebaseの設定 ★★★（ご自身のプロジェクト設定に書き換えてください）
        var firebaseConfig = {
            apiKey: "AIzaSyARzh6_jH8u9kRRkC4JSrvWCB9eBFKA1P0",
            authDomain: "speed-quiz26.firebaseapp.com",
            databaseURL: "https://speed-quiz26-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "speed-quiz26"
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        let quizData = [];
        let currentQuestionIndex = 0;
        let timerInterval = null;
        const TIME_LIMIT = 20; 
        let isClosed = false;

        // ★ 画面を切り替える関数（待機画面用の処理を追加）
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => {
                // 全画面からactiveクラス、wait-activeクラスを消す
                el.classList.remove('active', 'wait-active');
            });
            
            // 指定された画面にクラスを付与
            if (screenId === 'wait-screen') {
                // 待機画面だけ特別なクラス（gridレイアウトのため）
                document.getElementById(screenId).classList.add('wait-active');
            } else {
                // それ以外は共通のflexクラス
                document.getElementById(screenId).classList.add('active');
            }
        }

        // Firebaseからクイズ設定を読み込み
        db.ref('quizConfig').on('value', snap => {
            quizData = snap.val() || [];
        });

        // 管理者画面からのコマンド（adminCommand）を受信
        db.ref('adminCommand').on('value', snap => {
            const cmd = snap.val();
            if (!cmd) return;

            console.log("管理者コマンド受信:", cmd.type);

            switch(cmd.type) {
                case 'rules':
                    switchScreen('rules-screen');
                    currentQuestionIndex = 0;
                    stopTimer();
                    break;
                case 'start':
                case 'next':
                    if(cmd.type === 'next') currentQuestionIndex++;
                    
                    if (currentQuestionIndex < quizData.length) {
                        showQuestion(currentQuestionIndex);
                        switchScreen('quiz-screen');
                        startTimer();
                    } else {
                        // 問題がなくなったら終了
                        switchScreen('end-screen');
                        stopTimer();
                    }
                    break;
                case 'close':
                    // 手動締め切り
                    closeQuestion();
                    break;
                case 'end':
                    switchScreen('end-screen');
                    stopTimer();
                    break;
                case 'details':
                    switchScreen('details-screen');
                    stopTimer();
                    generateDetailsTable();
                    break;
                case 'ranking':
                    switchScreen('ranking-screen');
                    stopTimer();
                    generateRanking();
                    break;
                case 'reset':
                    switchScreen('wait-screen');
                    currentQuestionIndex = 0;
                    stopTimer();
                    break;
            }
        });

        // 問題を画面にセットする関数
        function showQuestion(index) {
            if (!quizData[index]) return;
            const q = quizData[index];
            document.getElementById('disp-qnum').innerText = `第 ${index + 1} 問`;
            document.getElementById('disp-qtext').innerText = q.text;
            
            // 画像があれば表示、なければ隠す
            const imgEl = document.getElementById('disp-qimg');
            if (q.img) {
                imgEl.src = q.img;
                imgEl.style.display = "block";
            } else {
                imgEl.style.display = "none";
                imgEl.src = "";
            }

            // 状態を初期化
            document.getElementById('disp-status').className = "status-badge status-thinking";
            document.getElementById('disp-status').innerText = "⏳ 回答受付中...";
            document.getElementById('disp-ans').style.display = "none";
            isClosed = false;
        }

        // 20秒タイマーを開始する関数
        function startTimer() {
            stopTimer();
            let timeLeft = TIME_LIMIT;
            const timerDisplay = document.getElementById('time-left');
            const timerBox = document.getElementById('timer-display');
            
            timerDisplay.innerText = timeLeft;
            timerBox.className = "timer-box"; // 色を元に戻す

            timerInterval = setInterval(() => {
                if (isClosed) { stopTimer(); return; }
                
                timeLeft--;
                timerDisplay.innerText = timeLeft;

                // 残り5秒で赤く点滅させる
                if (timeLeft <= 5 && timeLeft > 0) {
                    timerBox.className = "timer-box timer-urgent";
                }

                // 0秒になったら自動締め切り
                if (timeLeft <= 0) {
                    stopTimer();
                    closeQuestion();
                    // Firebaseに「close」コマンドを送信して、参加者スマホもロックさせる
                    db.ref('adminCommand').set({ type: 'close', ts: Date.now(), auto: true });
                }
            }, 1000);
        }

        // タイマーを止める関数
        function stopTimer() {
            if(timerInterval) clearInterval(timerInterval);
        }

        // ★★★ 採点＆得点計算（残り時間ポイント方式）★★★
        function closeQuestion() {
            if (isClosed) return; 
            isClosed = true;
            stopTimer();
            
            // 画面表示を「締め切り」にする
            document.getElementById('disp-status').className = "status-badge status-closed";
            document.getElementById('disp-status').innerText = "🛑 締め切りました！";
            
            if (!quizData[currentQuestionIndex]) return;

            // 正解を表示
            const correctAns = quizData[currentQuestionIndex].ans;
            document.getElementById('ans-text').innerText = correctAns;
            document.getElementById('disp-ans').style.display = "block";

            // ★参加者の回答データを読み込んで採点
            db.ref('answers').once('value', snap => {
                const answers = snap.val() || {}; // UID: {choice: 'A', time: 5000}
                
                db.ref('players').once('value', pSnap => {
                    const players = pSnap.val() || {}; // UID: {name: '坂本', score: 0, ...}
                    let updates = {};
                    
                    for(let uid in players) {
                        let p = players[uid];
                        let currentScore = p.score || 0;
                        let history = p.history || {};
                        
                        let isCorrect = false;
                        let timeTaken = 20000; // 答えていない人は20秒扱い
                        let points = 0;
                        
                        // このプレイヤーの回答があればチェック
                        if(answers[uid]) {
                            timeTaken = answers[uid].time;
                            if(timeTaken > 20000) timeTaken = 20000; // 20秒超えは20秒扱い
                            
                            if(answers[uid].choice === correctAns) {
                                // 正解！得点計算
                                isCorrect = true;
                                // 残り秒数を計算（ミリ秒を秒に直して切り捨て）
                                let remainSec = Math.floor((20000 - timeTaken) / 1000);
                                if(remainSec < 0) remainSec = 0;
                                // 【王道ルール】基本点100点 ＋ (残り秒数 × 10点)
                                points = 100 + (remainSec * 10);
                                currentScore += points;
                            }
                        }
                        
                        // この問題の採点履歴を保存
                        history[currentQuestionIndex] = {
                            isCorrect: isCorrect,
                            time: timeTaken,
                            points: points
                        };
                        
                        // データベースの更新データを準備
                        updates['players/' + uid + '/score'] = currentScore;
                        updates['players/' + uid + '/history'] = history;
                    }
                    
                    // まとめてFirebaseに上書き保存
                    if(Object.keys(updates).length > 0) {
                        db.ref().update(updates).then(() => {
                            // 計算が終わったら今回の回答BOX（answers）を空にする
                            db.ref('answers').remove();
                        });
                    } else {
                        // 参加者がいない場合もanswersは空にする
                        db.ref('answers').remove();
                    }
                });
            });
        }

        // 待機画面の「参加者リスト」をリアルタイム更新
        db.ref('players').on('value', snap => {
            const players = snap.val() || {};
            const listDiv = document.getElementById('p-list');
            listDiv.innerHTML = '';
            
            let count = 0;
            for (let id in players) {
                count++;
                const badge = document.createElement('div');
                badge.className = 'player-badge';
                // FontAwesomeのユーザーアイコンと名前
                badge.innerHTML = `<i class="fas fa-user"></i> ${players[id].name}`;
                listDiv.appendChild(badge);
            }
            // 人数表示を更新
            document.getElementById('p-count').innerText = count;
        });

        // ⑤ 全員の結果一覧（詳細表）を生成する関数
        function generateDetailsTable() {
            db.ref('players').once('value', snap => {
                const players = snap.val() || {};
                const qCount = quizData.length;
                
                let html = '<table><thead><tr><th>参加者名</th>';
                // 問題ごとの見出し（Q1, Q2...）
                for(let i=0; i<qCount; i++) {
                    html += `<th>Q${i+1}</th>`;
                }
                html += '<th>合計点</th></tr></thead><tbody>';
                
                // ★プレイヤーを合計点数順にソートして降順に並べる
                let playerArray = Object.values(players).sort((a,b) => (b.score||0) - (a.score||0));
                
                playerArray.forEach(p => {
                    // 名前
                    html += `<tr><td style="font-weight:bold; font-size: 30px;">${p.name}</td>`;
                    
                    // 各問題の正誤
                    for(let i=0; i<qCount; i++) {
                        if(p.history && p.history[i]) {
                            const h = p.history[i];
                            if(h.isCorrect) {
                                // 正解なら⭕とタイム（秒）
                                html += `<td class="td-correct">⭕<span class="td-time">(${(h.time/1000).toFixed(2)}秒)</span></td>`;
                            } else {
                                // 不正解なら❌
                                html += `<td class="td-wrong">❌</td>`;
                            }
                        } else {
                            // 未回答など履歴がない場合
                            html += `<td style="color:#777;">-</td>`;
                        }
                    }
                    // 合計点
                    html += `<td style="font-weight:bold; color:#f1c40f; font-size: 36px;">${p.score||0} pt</td></tr>`;
                });
                
                html += '</tbody></table>';
                document.getElementById('details-container').innerHTML = html;
            });
        }

        // ⑥ 総合発表（トップ3ランキング）を生成する関数
        function generateRanking() {
            db.ref('players').once('value', snap => {
                const players = snap.val() || {};
                
                // ★プレイヤーを合計点数順にソート（同点の場合は回答スピード合計が早い方を上位に）
                let playerArray = Object.values(players).sort((a,b) => {
                    // 点数が違うなら点数順
                    if((b.score||0) !== (a.score||0)) return (b.score||0) - (a.score||0);
                    // 点数が同じならタイム合計を計算して比較（タイムが少ない＝早い方が上位）
                    let timeA = 0; let timeB = 0;
                    if(a.history) Object.values(a.history).forEach(h => timeA += h.time);
                    if(b.history) Object.values(b.history).forEach(h => timeB += h.time);
                    return timeA - timeB; 
                });
                
                let html = '';
                // メダル、クラス
                const medals = ['🥇 優勝', '🥈 第2位', '🥉 第3位'];
                const classes = ['rank-1', 'rank-2', 'rank-3'];
                
                // トップ3まで描画
                for(let i=0; i<3; i++) {
                    if(playerArray[i]) {
                        const p = playerArray[i];
                        html += `
                            <div class="rank-row ${classes[i]}">
                                <div style="width: 25%; font-size: 50px;">${medals[i]}</div>
                                <div style="flex-grow: 1; text-align: center; font-size: 60px;">${p.name} さん</div>
                                <div style="width: 30%; text-align: right; font-size: 60px;">${p.score||0} pt</div>
                            </div>
                        `;
                    }
                }
                
                // 参加者がいない場合の保険
                if(html === '') html = '<div style="font-size:30px;">参加者がいませんでした</div>';
                
                document.getElementById('ranking-container').innerHTML = html;
            });
        }
    </script>
</body>
</html>
